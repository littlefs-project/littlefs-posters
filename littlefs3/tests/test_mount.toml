# Advanced mount tests
after = ['test_mtree', 'test_trvs']

# Test both with and without the gbmap if available
defines.GBMAP = [false, true]
if = 'LFS3_IFYES_GBMAP(GBMAP, true, !GBMAP)'


# test we can mount
[cases.test_mount_simple]
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    lfs3_unmount(&lfs3) => 0;
'''

# test that various mount flags don't assert and are returned by
# lfs3_fs_stat
[cases.test_mount_flags]
defines.RDONLY = [false, true]
defines.FLUSH = [false, true]
defines.SYNC = [false, true]
defines.REVPERTURB = [false, true]
defines.REVNOISE = [false, true]
defines.CKPROGS = [false, true]
defines.CKFETCHES = [false, true]
defines.CKMETAPARITY = [false, true]
defines.CKDATACKSUMS = [false, true]
defines.MKCONSISTENT = [false, true]
defines.LOOKAHEAD = [false, true]
defines.PREERASE = [false, true]
defines.COMPACT = [false, true]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
if = [
    'LFS3_IFYES_REVPERTURB(REVPERTURB, true, !REVPERTURB)',
    'LFS3_IFYES_REVNOISE(REVNOISE, true, !REVNOISE)',
    'LFS3_IFDEF_CKPROGS(true, !CKPROGS)',
    'LFS3_IFDEF_CKFETCHES(true, !CKFETCHES)',
    'LFS3_IFDEF_CKMETAPARITY(true, !CKMETAPARITY)',
    'LFS3_IFDEF_CKDATACKSUMS(true, !CKDATACKSUMS)',
    '!RDONLY || !MKCONSISTENT',
    '!RDONLY || !LOOKAHEAD',
    'LFS3_IFDEF_PREERASE(true, !PREERASE)',
    'GBMAP || !PREERASE',
    'REVPERTURB || !PREERASE',
    '!RDONLY || !PREERASE',
    '!RDONLY || !COMPACT',
]
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;
    lfs3_mount(&lfs3,
            ((RDONLY) ? LFS3_M_RDONLY : LFS3_M_RDWR)
                | ((FLUSH) ? LFS3_M_FLUSH : 0)
                | ((SYNC) ? LFS3_M_SYNC : 0)
                | ((REVPERTURB)
                    ? LFS3_IFDEF_REVPERTURB(LFS3_M_REVPERTURB, -1)
                    : 0)
                | ((REVNOISE) ? LFS3_IFDEF_REVNOISE(LFS3_M_REVNOISE, -1) : 0)
                | ((CKPROGS) ? LFS3_IFDEF_CKPROGS(LFS3_M_CKPROGS, -1) : 0)
                | ((CKFETCHES) ? LFS3_IFDEF_CKFETCHES(LFS3_M_CKFETCHES, -1) : 0)
                | ((CKMETAPARITY)
                    ? LFS3_IFDEF_CKMETAPARITY(LFS3_M_CKMETAPARITY, -1)
                    : 0)
                | ((CKDATACKSUMS)
                    ? LFS3_IFDEF_CKDATACKSUMS(LFS3_M_CKDATACKSUMS, -1)
                    : 0)
                | ((MKCONSISTENT) ? LFS3_M_MKCONSISTENT : 0)
                | ((LOOKAHEAD) ? LFS3_M_LOOKAHEAD : 0)
                | ((PREERASE) ? LFS3_IFDEF_PREERASE(LFS3_M_PREERASE, -1) : 0)
                | ((COMPACT) ? LFS3_M_COMPACT : 0)
                | ((CKMETA) ? LFS3_M_CKMETA : 0)
                | ((CKDATA) ? LFS3_M_CKDATA : 0),
            CFG) => 0;

    // lfs3_fs_stat only returns some flags
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            ((RDONLY) ? LFS3_I_RDONLY : 0)
                | ((FLUSH) ? LFS3_I_FLUSH : 0)
                | ((SYNC) ? LFS3_I_SYNC : 0)
                | ((REVPERTURB)
                    ? LFS3_IFDEF_REVPERTURB(LFS3_I_REVPERTURB, -1)
                    : 0)
                | ((REVNOISE) ? LFS3_IFDEF_REVNOISE(LFS3_I_REVNOISE, -1) : 0)
                | ((CKPROGS) ? LFS3_IFDEF_CKPROGS(LFS3_I_CKPROGS, -1) : 0)
                | ((CKFETCHES) ? LFS3_IFDEF_CKFETCHES(LFS3_I_CKFETCHES, -1) : 0)
                | ((CKMETAPARITY)
                    ? LFS3_IFDEF_CKMETAPARITY(LFS3_I_CKMETAPARITY, -1)
                    : 0)
                | ((CKDATACKSUMS)
                    ? LFS3_IFDEF_CKDATACKSUMS(LFS3_I_CKDATACKSUMS, -1)
                    : 0)
                | ((!MKCONSISTENT) ? LFS3_I_MKCONSISTENT : 0)
                | ((!LOOKAHEAD && (!GBMAP || PREERASE))
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE(
                    (GBMAP && !PREERASE) ? LFS3_I_PREERASE : 0,
                    0)
                | ((!COMPACT) ? LFS3_I_COMPACT : 0)
                // note ckdata implies ckmeta
                | ((!CKMETA && !CKDATA) ? LFS3_I_CKMETA : 0)
                | ((!CKDATA) ? LFS3_I_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));

    lfs3_unmount(&lfs3) => 0;
'''

# test that various format flags don't assert or anything
# 
# these end up passed to mount internally
[cases.test_mount_format_flags]
defines.REVPERTURB = [false, true]
defines.REVNOISE = [false, true]
defines.CKPROGS = [false, true]
defines.CKFETCHES = [false, true]
defines.CKMETAPARITY = [false, true]
defines.CKDATACKSUMS = [false, true]
defines.MKCONSISTENT = [false, true]
defines.LOOKAHEAD = [false, true]
defines.PREERASE = [false, true]
defines.COMPACT = [false, true]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
if = [
    'LFS3_IFYES_REVPERTURB(REVPERTURB, true, !REVPERTURB)',
    'LFS3_IFYES_REVNOISE(REVNOISE, true, !REVNOISE)',
    'LFS3_IFDEF_CKPROGS(true, !CKPROGS)',
    'LFS3_IFDEF_CKFETCHES(true, !CKFETCHES)',
    'LFS3_IFDEF_CKMETAPARITY(true, !CKMETAPARITY)',
    'LFS3_IFDEF_CKDATACKSUMS(true, !CKDATACKSUMS)',
    'LFS3_IFDEF_PREERASE(true, !PREERASE)',
    'GBMAP || !PREERASE',
    'REVPERTURB || !PREERASE',
]
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((REVPERTURB)
                    ? LFS3_IFDEF_REVPERTURB(LFS3_F_REVPERTURB, -1)
                    : 0)
                | ((REVNOISE) ? LFS3_IFDEF_REVNOISE(LFS3_F_REVNOISE, -1) : 0)
                | ((CKPROGS) ? LFS3_IFDEF_CKPROGS(LFS3_F_CKPROGS, -1) : 0)
                | ((CKFETCHES) ? LFS3_IFDEF_CKFETCHES(LFS3_F_CKFETCHES, -1) : 0)
                | ((CKMETAPARITY)
                    ? LFS3_IFDEF_CKMETAPARITY(LFS3_F_CKMETAPARITY, -1)
                    : 0)
                | ((CKDATACKSUMS)
                    ? LFS3_IFDEF_CKDATACKSUMS(LFS3_F_CKDATACKSUMS, -1)
                    : 0)
                | ((MKCONSISTENT) ? LFS3_F_MKCONSISTENT : 0)
                | ((LOOKAHEAD) ? LFS3_F_LOOKAHEAD : 0)
                | ((PREERASE) ? LFS3_IFDEF_PREERASE(LFS3_F_PREERASE, -1) : 0)
                | ((COMPACT) ? LFS3_F_COMPACT : 0)
                | ((CKMETA) ? LFS3_F_CKMETA : 0)
                | ((CKDATA) ? LFS3_F_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;

    // test that format-only flags are read correctly
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!GBMAP || (PREERASE && !LOOKAHEAD))
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));

    lfs3_unmount(&lfs3) => 0;
'''


# test that on-mount traversals do what they say they do

[cases.test_mount_t_lookahead]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;

    // by default we need a lookahead scan
    //
    // unless we have a gbmap, the gbmap is persistent so usually
    // _doesn't_ need a lookahead scan
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!GBMAP) ? LFS3_I_LOOKAHEAD : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;

    // with LFS3_M_LOOKAHEAD, mount performs a lookahead scan
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                | LFS3_M_LOOKAHEAD
                | ((CKMETA) ? LFS3_M_CKMETA : 0)
                | ((CKDATA) ? LFS3_M_CKDATA : 0),
            CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                // note ckdata implies ckmeta
                | ((!CKMETA && !CKDATA) ? LFS3_I_CKMETA : 0)
                | ((!CKDATA) ? LFS3_I_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;
'''

[cases.test_mount_t_lookgbmap]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
defines.SIZE = [
    'BLOCK_SIZE/2',
    'BLOCK_SIZE',
    '2*BLOCK_SIZE',
    '8*BLOCK_SIZE',
]
ifdef = 'LFS3_GBMAP'
if = 'GBMAP'
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;

    uint32_t prng = 42;

    // gbmap is persistent, so by default we _don't_ need a gbmap scan
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    // write to a file
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "jellyfish",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    uint8_t wbuf[SIZE];
    for (lfs3_size_t j = 0; j < SIZE; j++) {
        wbuf[j] = 'a' + (TEST_PRNG(&prng) % 26);
    }
    lfs3_file_write(&lfs3, &file, wbuf, SIZE) => SIZE;
    lfs3_file_close(&lfs3, &file) => 0;
    lfs3_unmount(&lfs3) => 0;

    // but if we allocated any blocks our gbmap will be inexhaustive
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | LFS3_I_LOOKAHEAD
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;

    // with LFS3_M_LOOKAHEAD, mount rebuild the gbmap
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                | LFS3_M_LOOKAHEAD
                | ((CKMETA) ? LFS3_M_CKMETA : 0)
                | ((CKDATA) ? LFS3_M_CKDATA : 0),
            CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                // note ckdata implies ckmeta
                | ((!CKMETA && !CKDATA) ? LFS3_I_CKMETA : 0)
                | ((!CKDATA) ? LFS3_I_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;
'''

[cases.test_mount_t_preerase]
defines.LOOKAHEAD = [false, true]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
defines.SIZE = [
    'BLOCK_SIZE/2',
    'BLOCK_SIZE',
    '2*BLOCK_SIZE',
    '8*BLOCK_SIZE',
]
# REMOUNT=0 => don't remount
# REMOUNT=1 => remount with preerase
# REMOUNT=2 => remount without preerase
defines.REMOUNT = [0, 1, 2]
# test with a number of different erase values
defines.ERASE_VALUE = [0xff, 0x00, -1]
ifdef = ['LFS3_GBMAP', 'LFS3_REVPERTURB', 'LFS3_PREERASE']
if = 'GBMAP'
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                // note preerasing needs revperturb
                | LFS3_F_REVPERTURB
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;

    uint32_t prng = 42;

    // by default, we don't preerase
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                // note preerasing needs revperturb
                | LFS3_M_REVPERTURB,
            CFG) => 0;
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_I_REVPERTURB
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | LFS3_I_PREERASE
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;

    // with LFS3_M_PREERASE, mount preerases a configurable number of
    // blocks
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                // note preerasing needs revperturb
                | LFS3_M_REVPERTURB
                | ((LOOKAHEAD) ? LFS3_M_LOOKAHEAD : 0)
                | LFS3_M_PREERASE,
            CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_I_REVPERTURB
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!LOOKAHEAD) ? LFS3_I_LOOKAHEAD : 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));

    // remount?
    //
    // preerasing is persistent, but our preeraser doesn't know the
    // gbmap state until triggered at least once
    if (REMOUNT) {
        lfs3_unmount(&lfs3) => 0;
        lfs3_mount(&lfs3,
                LFS3_M_RDWR
                    // note preerasing needs revperturb
                    | LFS3_M_REVPERTURB
                    | ((REMOUNT == 1 && LOOKAHEAD) ? LFS3_M_LOOKAHEAD : 0)
                    | ((REMOUNT == 1) ? LFS3_M_PREERASE : 0),
                CFG) => 0;
        lfs3_fs_stat(&lfs3, &fsinfo) => 0;
        assert(fsinfo.flags == (
                LFS3_I_REVPERTURB
                    | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                    | LFS3_I_MKCONSISTENT
                    | ((!LOOKAHEAD) ? LFS3_I_LOOKAHEAD : 0)
                    | ((REMOUNT != 1) ? LFS3_I_PREERASE : 0)
                    | LFS3_I_COMPACT
                    | LFS3_I_CKMETA
                    | LFS3_I_CKDATA
                    | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    }

    // write to a file to try to make sure nothing obvious is broken
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "jellyfish",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    uint8_t wbuf[SIZE];
    for (lfs3_size_t j = 0; j < SIZE; j++) {
        wbuf[j] = 'a' + (TEST_PRNG(&prng) % 26);
    }
    lfs3_file_write(&lfs3, &file, wbuf, SIZE) => SIZE;
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_unmount(&lfs3) => 0;
'''

[cases.test_mount_t_compact]
defines.LOOKAHEAD = [false, true]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
defines.SIZE = [
    'FCACHE_SIZE/2',
    '2*FCACHE_SIZE',
    'BLOCK_SIZE/2',
    'BLOCK_SIZE',
    '2*BLOCK_SIZE',
    '8*BLOCK_SIZE',
]
# set compact thresh to minimum
defines.GC_COMPACT_THRESH = 'BLOCK_SIZE/2'
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;

    uint32_t prng = 42;

    // first lets create a compactable filesystem
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;

    // write to our mdir until >gc_compact_thresh full
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "jellyfish",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;

    // hack, don't use the internals like this
    uint8_t wbuf[SIZE];
    while ((file.b.h.mdir.r.eoff & 0x7fffffff) <= GC_COMPACT_THRESH) {
        lfs3_file_rewind(&lfs3, &file) => 0;
        for (lfs3_size_t j = 0; j < SIZE; j++) {
            wbuf[j] = 'a' + (TEST_PRNG(&prng) % 26);
        }
        lfs3_file_write(&lfs3, &file, wbuf, SIZE) => SIZE;
        lfs3_file_sync(&lfs3, &file) => 0;
    }
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_unmount(&lfs3) => 0;

    // by default mount does not compact
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!GBMAP || SIZE >= BLOCK_SIZE/4)
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;

    // with LFS3_M_COMPACT, mount compacts any uncompacted blocks
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                | LFS3_M_COMPACT
                | ((LOOKAHEAD) ? LFS3_M_LOOKAHEAD : 0)
                | ((CKMETA) ? LFS3_M_CKMETA : 0)
                | ((CKDATA) ? LFS3_M_CKDATA : 0),
            CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!LOOKAHEAD && (!GBMAP || SIZE >= BLOCK_SIZE/4))
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                // note ckdata implies ckmeta
                | ((!CKMETA && !CKDATA) ? LFS3_I_CKMETA : 0)
                | ((!CKDATA) ? LFS3_I_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));

    // mdir should have been compacted
    lfs3_file_open(&lfs3, &file, "jellyfish", LFS3_O_RDONLY) => 0;
    assert((file.b.h.mdir.r.eoff & 0x7fffffff) <= GC_COMPACT_THRESH);

    // check we can still read the file
    uint8_t rbuf[SIZE];
    lfs3_file_read(&lfs3, &file, rbuf, SIZE) => SIZE;
    assert(memcmp(rbuf, wbuf, SIZE) == 0);
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_unmount(&lfs3) => 0;
'''

[cases.test_mount_t_mkconsistent]
defines.LOOKAHEAD = [false, true]
defines.COMPACT = [false, true]
defines.CKMETA = [false, true]
defines.CKDATA = [false, true]
defines.SIZE = 'FCACHE_SIZE/2'
# <=2 => grm-able
#  >2 => requires orphans
defines.ORPHANS = [0, 1, 2, 3, 100]
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3,
            LFS3_F_RDWR
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
            CFG) => 0;

    uint32_t prng = 42;

    // first lets create some orphans
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;

    // create two files
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "cuttlefish",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    uint8_t wbuf1[SIZE];
    for (lfs3_size_t j = 0; j < SIZE; j++) {
        wbuf1[j] = 'a' + (TEST_PRNG(&prng) % 26);
    }
    lfs3_file_write(&lfs3, &file, wbuf1, SIZE) => SIZE;
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_file_open(&lfs3, &file, "octopus",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    uint8_t wbuf2[SIZE];
    for (lfs3_size_t j = 0; j < SIZE; j++) {
        wbuf2[j] = 'a' + (TEST_PRNG(&prng) % 26);
    }
    lfs3_file_write(&lfs3, &file, wbuf2, SIZE) => SIZE;
    lfs3_file_close(&lfs3, &file) => 0;

    // create this many orphaned files
    //
    // anytime we close a not-yet-created desync file, we create an
    // orphan, but note we need these to be different files, and we need
    // to close them after all open calls, otherwise we just end up with
    // one orphan (littlefs is eager to clean up orphans)
    //
    lfs3_file_t orphans[ORPHANS];
    for (lfs3_size_t i = 0; i < ORPHANS; i++) {
        char name[256];
        sprintf(name, "jellyfish%03x", i);
        lfs3_file_open(&lfs3, &orphans[i], name,
                LFS3_O_WRONLY
                    | LFS3_O_CREAT
                    | LFS3_O_EXCL
                    | LFS3_O_DESYNC) => 0;
    }
    for (lfs3_size_t i = 0; i < ORPHANS; i++) {
        lfs3_file_close(&lfs3, &orphans[i]) => 0;
    }

    lfs3_unmount(&lfs3) => 0;

    // by default we clean up orphans lazily
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    struct lfs3_fsinfo fsinfo;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | LFS3_I_MKCONSISTENT
                | ((!GBMAP || ORPHANS >= 100)
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | LFS3_I_COMPACT
                | LFS3_I_CKMETA
                | LFS3_I_CKDATA
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));
    lfs3_unmount(&lfs3) => 0;

    // with LFS3_M_MKCONSISTENT, mount cleans up orphans eagerly
    lfs3_mount(&lfs3,
            LFS3_M_RDWR
                | LFS3_M_MKCONSISTENT
                | ((LOOKAHEAD) ? LFS3_M_LOOKAHEAD : 0)
                | ((COMPACT) ? LFS3_M_COMPACT : 0)
                | ((CKMETA) ? LFS3_M_CKMETA : 0)
                | ((CKDATA) ? LFS3_M_CKDATA : 0),
            CFG) => 0;
    lfs3_fs_stat(&lfs3, &fsinfo) => 0;
    assert(fsinfo.flags == (
            LFS3_IFYES_REVPERTURB(LFS3_I_REVPERTURB, 0, 0)
                | LFS3_IFYES_REVNOISE(LFS3_I_REVNOISE, 0, 0)
                | ((!LOOKAHEAD && (!GBMAP || ORPHANS >= 100))
                    ? LFS3_I_LOOKAHEAD
                    : 0)
                | LFS3_IFDEF_PREERASE((GBMAP) ? LFS3_I_PREERASE : 0, 0)
                | ((!COMPACT) ? LFS3_I_COMPACT : 0)
                // note ckdata implies ckmeta
                | ((!CKMETA && !CKDATA) ? LFS3_I_CKMETA : 0)
                | ((!CKDATA) ? LFS3_I_CKDATA : 0)
                | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_I_GBMAP, -1) : 0)));

    // check we can still read the files
    lfs3_file_open(&lfs3, &file, "cuttlefish", LFS3_O_RDONLY) => 0;
    uint8_t rbuf[SIZE];
    lfs3_file_read(&lfs3, &file, rbuf, SIZE) => SIZE;
    assert(memcmp(rbuf, wbuf1, SIZE) == 0);
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_file_open(&lfs3, &file, "octopus", LFS3_O_RDONLY) => 0;
    lfs3_file_read(&lfs3, &file, rbuf, SIZE) => SIZE;
    assert(memcmp(rbuf, wbuf2, SIZE) == 0);
    lfs3_file_close(&lfs3, &file) => 0;

    lfs3_unmount(&lfs3) => 0;
'''

# test we can detect at least fully clobbered blocks
#
# these are tested more thoroughly in test_ck
[cases.test_mount_t_ckmeta]
defines.N = [1, 2, 4, 8, 16, 32, 64]
defines.SIZE = [
    '0',
    'FCACHE_SIZE/2',
    '2*FCACHE_SIZE',
    'BLOCK_SIZE/2',
    'BLOCK_SIZE',
    '2*BLOCK_SIZE',
    '8*BLOCK_SIZE',
]
if = '(SIZE*N)/BLOCK_SIZE <= 32'
code = '''
    lfs3_block_t i = 0;
    while (true) {
        // a bit hacky, but this catches infinite loops
        assert(i < 2*BLOCK_COUNT);

        lfs3_t lfs3;
        lfs3_format(&lfs3,
                LFS3_F_RDWR
                    | ((GBMAP) ? LFS3_IFDEF_GBMAP(LFS3_F_GBMAP, -1) : 0),
                CFG) => 0;
        lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;

        // create an interesting filesystem
        uint32_t prng = 42;
        for (lfs3_size_t i = 0; i < N; i++) {
            char name[256];
            sprintf(name, "squid%03x", i);

            uint8_t wbuf[SIZE];
            for (lfs3_size_t j = 0; j < SIZE; j++) {
                wbuf[j] = 'a' + (TEST_PRNG(&prng) % 26);
            }

            lfs3_file_t file;
            lfs3_file_open(&lfs3, &file, name,
                    LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
            lfs3_file_write(&lfs3, &file, wbuf, SIZE) => SIZE;
            lfs3_file_close(&lfs3, &file) => 0;
        }

        // traverse to find blocks
        lfs3_trv_t trv;
        lfs3_trv_open(&lfs3, &trv, LFS3_T_RDONLY) => 0;
        lfs3_block_t k = 0;
        for (lfs3_block_t j = 0;; j++) {
            assert(j < 2*BLOCK_COUNT);

            struct lfs3_tinfo tinfo;
            int err = lfs3_trv_read(&lfs3, &trv, &tinfo);
            assert(!err || err == LFS3_ERR_NOENT);
            if (err == LFS3_ERR_NOENT) {
                lfs3_trv_close(&lfs3, &trv) => 0;
                lfs3_unmount(&lfs3) => 0;
                goto done;
            }

            // this gets a bit tricky be cause we need to clobber both
            // blocks in mdir pairs
            if (tinfo.btype == LFS3_BTYPE_MDIR
                    || tinfo.btype == LFS3_BTYPE_BTREE) {
                if (k == i || k == i+1) {
                    // clobber this block
                    printf("clobbering 0x%x\n", tinfo.block);
                    uint8_t clobber_buf[BLOCK_SIZE];
                    memset(clobber_buf, 0xcc, BLOCK_SIZE);
                    CFG->erase(CFG, tinfo.block) => 0;
                    CFG->prog(CFG, tinfo.block, 0,
                            clobber_buf, BLOCK_SIZE) => 0;
                    if (tinfo.btype != LFS3_BTYPE_MDIR || k == i+1) {
                        i += (tinfo.btype == LFS3_BTYPE_MDIR) ? 2 : 1;
                        lfs3_trv_close(&lfs3, &trv) => 0;
                        lfs3_unmount(&lfs3) => 0;
                        goto clobbered;
                    }
                }
                k += 1;
            }
        }

    clobbered:;
        // mount with LFS3_M_CKMETA, we should detect clobbered blocks
        lfs3_mount(&lfs3,
                LFS3_M_RDWR
                    | LFS3_M_CKMETA,
                CFG) => LFS3_ERR_CORRUPT;
    }
done:;
'''

[cases.test_mount_t_ckdata]
defines.N = [1, 2, 4, 8, 16, 32, 64]
defines.SIZE = [
    '0',
    'FCACHE_SIZE/2',
