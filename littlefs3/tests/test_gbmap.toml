            &bid_, &weight_, NULL) => LFS3_TAG_BMFREE;
    assert(bid_ == 5);
    assert(weight_ == 6);
    lfs3_gbmap_lookupnext(&lfs3, &gbmap, 6,
            &bid_, &weight_, NULL) => LFS3_TAG_BMBAD;
    assert(bid_ == 6);
    assert(weight_ == 1);
    lfs3_gbmap_lookupnext(&lfs3, &gbmap, 7,
            &bid_, &weight_, NULL) => LFS3_TAG_BMFREE;
    assert(bid_ == 7);
    assert(weight_ == 1);
