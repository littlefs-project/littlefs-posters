[cases.bench_rbyd_id_create]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 4096
defines.STEP = 8
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    for (lfs3_size_t n = 0; n < N; n += STEP) {
        lfs3_rbyd_t rbyd = {
            .blocks[0] = 0,
            .eoff = 0,
            .cksum = 0,
            .trunk = 0,
            .weight = 0,
        };
        lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

        // create commits, note we need to take care to generate
        // indexes within a valid range as the rbyd grows
        uint32_t prng = SEED;
        for (lfs3_size_t i = 0; i < n; i++) {
            lfs3_off_t i_
                    = (ORDER == 0) ? i
                    : (ORDER == 1) ? 0
                    : BENCH_PRNG(&prng) % (rbyd.weight+1);
            uint8_t wbuf[SIZE];
            memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
            lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, +1,
                        wbuf, SIZE))) => 0;
        }

        // create an attr
        BENCH_START("create", n+STEP);
        lfs3_off_t i_ = BENCH_PRNG(&prng) % (n+1);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                LFS3_RATTR_BUF(
                    LFS3_TAG_DATA, +1,
                    wbuf, SIZE))) => 0;
        BENCH_STOP("create");

        // test that our create worked
        lfs3_tag_t tag_;
        lfs3_data_t data_;
        lfs3_rbyd_lookup(&lfs3, &rbyd, i_, LFS3_TAG_DATA,
                &tag_, &data_) => 0;
        assert(tag_ == LFS3_TAG_DATA);
        assert(lfs3_data_size(data_) == SIZE);
        uint8_t rbuf[SIZE];
        lfs3_data_read(&lfs3, &data_, rbuf, SIZE) => SIZE;
        assert(memcmp(rbuf, wbuf, SIZE) == 0);
    }
'''

