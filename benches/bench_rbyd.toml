                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, +1,
                        wbuf, SIZE))) => 0;
        }

        // delete an attr
        BENCH_START("delete", n+STEP);
        lfs3_off_t i_ = 0;
        if (n > 0) {
            i_ = BENCH_PRNG(&prng) % n;
            lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
