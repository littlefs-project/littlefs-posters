# Bench our low-level rbyd data-structure

# set block_size to the full size of disk so we can test arbitrarily
# large rbyd trees, we don't really care about block sizes at this
# abstraction level
defines.DISK_SIZE = 524288
defines.BLOCK_SIZE = 524288
defines.BLOCK_COUNT = 1

[cases.bench_rbyd_attr_append]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 256
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    for (lfs3_size_t n = 0; n < N; n += STEP) {
        lfs3_rbyd_t rbyd = {
            .blocks[0] = 0,
            .eoff = 0,
            .cksum = 0,
            .trunk = 0,
            .weight = 0,
        };
        lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

        // create N attrs
        //
        // NOTE we only have 256 user attributes, so this benchmark is
        // a bit limited
        uint32_t prng = SEED;
        for (lfs3_size_t i = 0; i < n; i++) {
            lfs3_off_t i_
                    = (ORDER == 0) ? i
                    : (ORDER == 1) ? (n-1-i)
                    : BENCH_PRNG(&prng) % n;
            uint8_t wbuf[SIZE];
            memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
            lfs3_rbyd_commit(&lfs3, &rbyd, -1, LFS3_RATTRS(
                    LFS3_RATTR_BUF(
                        LFS3_TAG_ATTR(i_ & 0xff), 0,
                        wbuf, SIZE))) => 0;
        }

        // append an attr
        BENCH_START("append", n+STEP);
        lfs3_off_t i_ = BENCH_PRNG(&prng) % (n+1);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_rbyd_commit(&lfs3, &rbyd, -1, LFS3_RATTRS(
                LFS3_RATTR_BUF(
                    LFS3_TAG_ATTR(i_ & 0xff), 0,
                    wbuf, SIZE))) => 0;
        BENCH_STOP("append");

        // test that our append worked
        lfs3_tag_t tag_;
        lfs3_data_t data_;
        lfs3_rbyd_lookup(&lfs3, &rbyd, -1, LFS3_TAG_ATTR(i_ & 0xff),
                &tag_, &data_) => 0;
        assert(tag_ == LFS3_TAG_ATTR(i_ & 0xff));
        assert(lfs3_data_size(data_) == SIZE);
        uint8_t rbuf[SIZE];
        lfs3_data_read(&lfs3, &data_, rbuf, SIZE) => SIZE;
        assert(memcmp(rbuf, wbuf, SIZE) == 0);
    }
'''

[cases.bench_rbyd_attr_remove]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 256
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    for (lfs3_size_t n = 0; n < N; n += STEP) {
        lfs3_rbyd_t rbyd = {
            .blocks[0] = 0,
            .eoff = 0,
            .cksum = 0,
            .trunk = 0,
            .weight = 0,
        };
        lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

        // create N attrs
        //
        // NOTE we only have 256 user attributes, so this benchmark is
        // a bit limited
        uint32_t prng = SEED;
        for (lfs3_size_t i = 0; i < n; i++) {
            lfs3_off_t i_
                    = (ORDER == 0) ? i
                    : (ORDER == 1) ? (n-1-i)
                    : BENCH_PRNG(&prng) % n;
            uint8_t wbuf[SIZE];
            memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
            lfs3_rbyd_commit(&lfs3, &rbyd, -1, LFS3_RATTRS(
                    LFS3_RATTR_BUF(
                        LFS3_TAG_ATTR(i_ & 0xff), 0,
                        wbuf, SIZE))) => 0;
        }

        // remove an attr
        BENCH_START("remove", n+STEP);
        lfs3_off_t i_ = 0;
