    // it's a bit awkward, but this reports the amount read to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("read", readed);
    BENCH_STOP("read");

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''

[cases.bench_p26_rt_many]
code = '''
    #ifdef LFS3
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #else
    lfs2_t lfs2;
    lfs2_format(&lfs2, (const struct lfs2_config*)CFG) => 0;
    lfs2_mount(&lfs2, (const struct lfs2_config*)CFG) => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #ifdef LFS3
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #else
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #endif

    // create files to read
    #ifdef LFS3
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        char name[256];
        sprintf(name, "bench_%08x", i);
        lfs3_file_t file;
        lfs3_file_open(&lfs3, &file, name,
                LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        lfs3_file_close(&lfs3, &file) => 0;
    }
    #else
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        char name[256];
        sprintf(name, "bench_%08x", i);
        lfs2_file_t file;
        lfs2_file_open(&lfs2, &file, name,
                LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        lfs2_file_close(&lfs2, &file) => 0;
    }
    #endif

    // reset our timer
    bench_p26_reset(CFG);

    // open the files
    BENCH_START("read", 0);
    uint64_t readed = 0;
    while (!bench_p26_oot(CFG)) {
        // choose a random filename
        lfs3_off_t pos = BENCH_PRNG(&prng) % ((SIZE+(CHUNK-1))/CHUNK);
        char name[256];
        sprintf(name, "bench_%08x", pos);

        // read the file
        //
        // note file == CHUNK here, the sum of all files should add up
        // roughly to the benchmark SIZE
        uint8_t rbuf[CHUNK];
        #ifdef LFS3
        lfs3_file_t file;
        lfs3_file_open(&lfs3, &file, name, LFS3_O_RDONLY) => 0;
        lfs3_file_read(&lfs3, &file, rbuf, CHUNK) => CHUNK;
        lfs3_file_close(&lfs3, &file) => 0;
        #else
        lfs2_file_t file;
        lfs2_file_open(&lfs2, &file, name, LFS2_O_RDONLY) => 0;
        lfs2_file_read(&lfs2, &file, rbuf, CHUNK) => CHUNK;
        lfs2_file_close(&lfs2, &file) => 0;
        #endif

        readed += CHUNK;
    }
    BENCH_STOP("read");

    // it's a bit awkward, but this reports the amount read to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("read", readed);
    BENCH_STOP("read");

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''
