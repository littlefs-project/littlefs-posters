# Bench many files/dirs

[cases.bench_many_files]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR | LFS3_M_MKCONSISTENT, CFG) => 0;

    // allocate a bitmap for disk usage
    uint8_t *usage_bmap = malloc((BLOCK_COUNT+8-1)/8);

    // create a filesystem with N files
    uint32_t prng = SEED;
    for (lfs3_size_t i = 0; i < N; i++) {
        lfs3_mid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? N-1-i
                : BENCH_PRNG(&prng) % N;
        char name[256];
        sprintf(name, "file%05d", i_);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);

        // measure creat+write
        if ((i+1) % STEP == 0) {
            BENCH_START("creat", i+1);
        }
        lfs3_file_t file;
        int err = lfs3_file_open(&lfs3, &file, name,
                LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL);
        assert(!err || err == LFS3_ERR_EXIST);
        if (!err) {
            lfs3_file_write(&lfs3, &file, &wbuf, SIZE) => SIZE;
            lfs3_file_close(&lfs3, &file) => 0;
        }
        if ((i+1) % STEP == 0) {
            BENCH_STOP("creat");
        }

        if ((i+1) % STEP == 0) {
            // measure open+read
            BENCH_START("read", i+1);
            lfs3_mid_t i_ = BENCH_PRNG(&prng) % N;
            sprintf(name, "file%05d", i_);
            err = lfs3_file_open(&lfs3, &file, name, LFS3_O_RDONLY);
            assert(!err || err == LFS3_ERR_NOENT);
            if (!err) {
                uint8_t rbuf[SIZE];
                lfs3_file_read(&lfs3, &file, rbuf, SIZE) => SIZE;
                lfs3_file_close(&lfs3, &file) => 0;
            }
            BENCH_STOP("read");

            // measure traversal cost
            BENCH_START("traversal", i+1);
            lfs3_traversal_t t;
            lfs3_traversal_open(&lfs3, &t, 0) => 0;
            while (true) {
                struct lfs3_tinfo tinfo;
                int err = lfs3_traversal_read(&lfs3, &t,
                        &tinfo);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }
            }
            lfs3_traversal_close(&lfs3, &t) => 0;
            BENCH_STOP("traversal");

            // measure disk usage
            //
            // littlefs can be a dag, so build a bitmap to find the
            // exact disk usage
            memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);
            lfs3_traversal_open(&lfs3, &t, 0) => 0;
            while (true) {
                struct lfs3_tinfo tinfo;
                int err = lfs3_traversal_read(&lfs3, &t, &tinfo);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }

                usage_bmap[tinfo.block/8] |= 1 << (tinfo.block % 8);
            }
            lfs3_traversal_close(&lfs3, &t) => 0;
            lfs3_size_t usage = 0;
            for (lfs3_size_t j = 0; j < BLOCK_COUNT; j++) {
                if (usage_bmap[j / 8] & (1 << (j % 8))) {
                    usage += 1;
                }
            }
            BENCH_RESULT("usage", i+1,
                    (uintmax_t)usage * (uintmax_t)CFG->block_size);
        }
    }

    free(usage_bmap);
    lfs3_unmount(&lfs3) => 0;
'''

[cases.bench_many_dirs]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
code = '''
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR | LFS3_M_MKCONSISTENT, CFG) => 0;

    // allocate a bitmap for disk usage
    uint8_t *usage_bmap = malloc((BLOCK_COUNT+8-1)/8);

    // create a filesystem with N dirs
    uint32_t prng = SEED;
    for (lfs3_size_t i = 0; i < N; i++) {
        lfs3_mid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? N-1-i
                : BENCH_PRNG(&prng) % N;
        char name[256];
        sprintf(name, "dir%05d", i_);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);

        // measure creat+write
        if ((i+1) % STEP == 0) {
            BENCH_START("mkdir", i+1);
        }
        int err = lfs3_mkdir(&lfs3, name);
        assert(!err || err == LFS3_ERR_EXIST);
        if ((i+1) % STEP == 0) {
            BENCH_STOP("mkdir");
        }

        if ((i+1) % STEP == 0) {
            // measure open+read
            BENCH_START("read", i+1);
            lfs3_mid_t i_ = BENCH_PRNG(&prng) % N;
            sprintf(name, "dir%05d", i_);
            lfs3_dir_t dir;
            err = lfs3_dir_open(&lfs3, &dir, name);
            assert(!err || err == LFS3_ERR_NOENT);
            if (!err) {
                struct lfs3_info info;
                lfs3_dir_read(&lfs3, &dir, &info) => 0;
                assert(strcmp(info.name, ".") == 0);
                assert(info.type == LFS3_TYPE_DIR);
                assert(info.size == 0);
                lfs3_dir_read(&lfs3, &dir, &info) => 0;
                assert(strcmp(info.name, "..") == 0);
                assert(info.type == LFS3_TYPE_DIR);
                assert(info.size == 0);
                lfs3_dir_read(&lfs3, &dir, &info) => LFS3_ERR_NOENT;
                lfs3_dir_close(&lfs3, &dir) => 0;
            }
            BENCH_STOP("read");

            // measure traversal cost
            BENCH_START("traversal", i+1);
            lfs3_traversal_t t;
            lfs3_traversal_open(&lfs3, &t, 0) => 0;
            while (true) {
                struct lfs3_tinfo tinfo;
                int err = lfs3_traversal_read(&lfs3, &t,
                        &tinfo);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }
            }
            lfs3_traversal_close(&lfs3, &t) => 0;
            BENCH_STOP("traversal");

            // measure disk usage
            //
            // littlefs can be a dag, so build a bitmap to find the
            // exact disk usage
            memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);
            lfs3_traversal_open(&lfs3, &t, 0) => 0;
            while (true) {
                struct lfs3_tinfo tinfo;
                int err = lfs3_traversal_read(&lfs3, &t, &tinfo);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }

                usage_bmap[tinfo.block/8] |= 1 << (tinfo.block % 8);
            }
            lfs3_traversal_close(&lfs3, &t) => 0;
            lfs3_size_t usage = 0;
            for (lfs3_size_t j = 0; j < BLOCK_COUNT; j++) {
                if (usage_bmap[j / 8] & (1 << (j % 8))) {
                    usage += 1;
                }
            }
            BENCH_RESULT("usage", i+1,
                    (uintmax_t)usage * (uintmax_t)CFG->block_size);
        }
    }

    free(usage_bmap);
    lfs3_unmount(&lfs3) => 0;
'''
