    #elif defined(LFS2)
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_gc_quick(&spiffs, 0) => SPIFFS_ERR_NO_DELETED_BLOCKS;
    #elif defined(YAFFS2)
    yaffs_sync("/") => 0;
    #endif

    // reset our timer
    bench_helpers_simreset(CFG);

    // open a file
    BENCH_START("write", 0);
    #if defined(LFS3)
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_log",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL | LFS3_O_APPEND) => 0;
    #elif defined(LFS2)
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_log",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL | LFS2_O_APPEND) => 0;
    #elif defined(SPIFFS)
    spiffs_file fd = SPIFFS_open(&spiffs, "bench_log",
            SPIFFS_RDWR | SPIFFS_CREAT | SPIFFS_EXCL | SPIFFS_APPEND, 0777);
    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_log",
            O_RDWR | O_CREAT | O_EXCL | O_APPEND, 0777);
    assert(fd >= 0);
    #endif
    uint64_t written = 0;
    while (!(SIM_SIZE
                && written >= (uint64_t)SIM_SIZE)
            && !(SIM_TIME
                && bench_helpers_simtime(CFG) >= (uint64_t)SIM_TIME)) {
        // append to log
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #if defined(LFS3)
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif

        // sync
        #if defined(LFS3)
        lfs3_file_sync(&lfs3, &file) => 0;
        #elif defined(LFS2)
        lfs2_file_sync(&lfs2, &file) => 0;
        #elif defined(SPIFFS)
        s32_t d = SPIFFS_fflush(&spiffs, fd);
        assert(d >= 0);
        #elif defined(YAFFS2)
        yaffs_fsync(fd) => 0;
        #endif

        // for v3, fruncate, for v2, rotate if full
        //
        // unlike litmus benchmarks we just use SIZE here
        #if defined(LFS3)
        lfs3_soff_t size = lfs3_file_size(&lfs3, &file);
        assert(size >= 0);
        if (size > SIZE) {
            lfs3_file_fruncate(&lfs3, &file, SIZE) => 0;
        }
        #elif defined(LFS2)
        lfs3_soff_t size = lfs2_file_size(&lfs2, &file);
        assert(size >= 0);
        if (size >= SIZE) {
            lfs2_file_close(&lfs2, &file) => 0;
            lfs2_rename(&lfs2, "bench_log", "bench_log.1") => 0;
            lfs2_file_open(&lfs2, &file, "bench_log",
                    LFS2_O_RDWR
                        | LFS2_O_CREAT
                        | LFS2_O_EXCL
                        | LFS2_O_APPEND) => 0;
        }
        #elif defined(SPIFFS)
        spiffs_stat stat;
        SPIFFS_fstat(&spiffs, fd, &stat) => 0;
        assert(stat.size >= 0);
        if (stat.size >= SIZE) {
            SPIFFS_close(&spiffs, fd) => 0;
            int err = SPIFFS_remove(&spiffs, "bench_log.1");
            assert(!err || err == SPIFFS_ERR_NOT_FOUND);
            SPIFFS_rename(&spiffs, "bench_log", "bench_log.1") => 0;
            fd = SPIFFS_open(&spiffs, "bench_log",
                    SPIFFS_RDWR
                        | SPIFFS_CREAT
                        | SPIFFS_EXCL
                        | SPIFFS_APPEND, 0777);
            assert(fd >= 0);
        }
        #elif defined(YAFFS2)
        struct yaffs_stat stat;
        yaffs_fstat(fd, &stat) => 0;
        if (stat.st_size >= SIZE) {
            yaffs_close(fd) => 0;
            yaffs_rename("bench_log", "bench_log.1") => 0;
            fd = yaffs_open("bench_log",
                    O_RDWR | O_CREAT | O_EXCL | O_APPEND, 0777);
            assert(fd >= 0);
        }
        #endif

        written += CHUNK;

        // bail if we get stuck
        if (SIM_TIME && bench_helpers_simstuck(CFG, written)) {
            return;
        }
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    BENCH_STOP("write");

    // it's a bit awkward, but this reports the amount written to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("write", written);
    BENCH_STOP("write");

    // report the total stack/heap usage after the benchmark
    BENCH_RESULT("stack", written, BENCH_STACK());
    BENCH_RESULT("heap", written, BENCH_HEAP());

    // find the total disk usage after the benchmark
    #if defined(LFS3)
    uintmax_t usage = bench_helpers_usage(&lfs3);
    #elif defined(LFS2)
    uintmax_t usage = bench_helpers_usage(&lfs2);
    #elif defined(SPIFFS)
    uintmax_t usage = bench_helpers_usage(&spiffs);
    #elif defined(YAFFS2)
    uintmax_t usage = bench_helpers_usage(&yaffs2);
    #endif
    BENCH_RESULT("usage", written, usage);

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''
