# High-level write-throughput benchmarks


# these are common and can be overridden suite-wide
#
# note for bench_p26_litmus_many, CHUNK => file size, and SIZE = sum of
# all files
#
defines.SIZE = 32768
defines.CHUNK = 32
defines.SEED = 42

# simulated time, in nanoseconds, to run the test
defines.SIM_TIME = '60000000000ULL' # 1 minute
# simulation size in bytes
defines.SIM_SIZE = 0


# include common bench helpers
code = '''
#include "benches/bench_helpers.h"
'''


[cases.bench_p26_wt_linear]
code = '''
    // ok, one of these needs to be non-zero
    LFS3_ASSERT(SIM_TIME > 0 || SIM_SIZE > 0);

    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t work_buffer[2*SPAGE_SIZE];
    uint8_t fd_buffer[FD_SIZE];
    uint8_t scache_buffer[SCACHE_SIZE];
    // yes we need this mount
    int err = SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL);
    assert(err == SPIFFS_ERR_NOT_A_FS
            || err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE);
    if (err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE) {
        printf("error: spiffs magic not possible\n");
        return;
    }
    SPIFFS_format(&spiffs) => 0;
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #if defined(LFS3)
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_gc_quick(&spiffs, 0) => SPIFFS_ERR_NO_DELETED_BLOCKS;
    #elif defined(YAFFS2)
    yaffs_sync("/") => 0;
    #endif

    // reset our timer
    bench_helpers_simreset(CFG);

    // open a file
    BENCH_START("write", 0);
    #if defined(LFS3)
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_linear",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #elif defined(LFS2)
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_linear",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #elif defined(SPIFFS)
    spiffs_file fd = SPIFFS_open(&spiffs, "bench_linear",
            SPIFFS_RDWR | SPIFFS_CREAT | SPIFFS_EXCL, 0777);
    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_linear", O_RDWR | O_CREAT | O_EXCL, 0777);
    assert(fd >= 0);
    #endif
    lfs3_off_t size = 0;
    uint64_t written = 0;
    while (!(SIM_SIZE
                && written >= (uint64_t)SIM_SIZE)
            && !(SIM_TIME
                && bench_helpers_simtime(CFG) >= (uint64_t)SIM_TIME)) {
        // arguably we should just rewind and continue writing to the
        // front of the file when we hit the end, but this overly
        // penalizes littlefs2, so instead we truncate
        if (size >= SIZE) {
            #if defined(LFS3)
            lfs3_file_rewind(&lfs3, &file) => 0;
            lfs3_file_truncate(&lfs3, &file, 0) => 0;
            #elif defined(LFS2)
            lfs2_file_rewind(&lfs2, &file) => 0;
            lfs2_file_truncate(&lfs2, &file, 0) => 0;
            #elif defined(SPIFFS)
            SPIFFS_lseek(&spiffs, fd, 0, SPIFFS_SEEK_SET) => 0;
            SPIFFS_ftruncate(&spiffs, fd, 0) => 0;
            #elif defined(YAFFS2)
            yaffs_lseek(fd, 0, SEEK_SET) => 0;
            yaffs_ftruncate(fd, 0) => 0;
            #endif
            size = 0;
        }

        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #if defined(LFS3)
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif
        size += CHUNK;
        written += CHUNK;

        // bail if we get stuck
        if (SIM_TIME && bench_helpers_simstuck(CFG, written)) {
            return;
        }
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    BENCH_STOP("write");

    // it's a bit awkward, but this reports the amount written to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("write", written);
    BENCH_STOP("write");

    // report the total stack/heap usage after the benchmark
    BENCH_RESULT("stack", written, BENCH_STACK());
    BENCH_RESULT("heap", written, BENCH_HEAP());

    // find the total disk usage after the benchmark
    #if defined(LFS3)
    uintmax_t usage = bench_helpers_usage(&lfs3);
    #elif defined(LFS2)
    uintmax_t usage = bench_helpers_usage(&lfs2);
    #elif defined(SPIFFS)
    uintmax_t usage = bench_helpers_usage(&spiffs);
    #elif defined(YAFFS2)
    uintmax_t usage = bench_helpers_usage(&yaffs2);
    #endif
    BENCH_RESULT("usage", written, usage);

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

[cases.bench_p26_wt_random]
if = [
    # littlefs2 simply doesn't scale well enough for this
    'BENCH_IFDEF_LFS2(SIZE <= 128*1024, true)',
    # spiffs simply doesn't scale well enough for this
    'BENCH_IFDEF_SPIFFS(SIZE <= 128*1024, true)',
]
code = '''
    // ok, one of these needs to be non-zero
    LFS3_ASSERT(SIM_TIME > 0 || SIM_SIZE > 0);

    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t work_buffer[2*SPAGE_SIZE];
    uint8_t fd_buffer[FD_SIZE];
    uint8_t scache_buffer[SCACHE_SIZE];
    // yes we need this mount
    int err = SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL);
    assert(err == SPIFFS_ERR_NOT_A_FS
            || err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE);
    if (err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE) {
        printf("error: spiffs magic not possible\n");
        return;
    }
    SPIFFS_format(&spiffs) => 0;
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #if defined(LFS3)
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_gc_quick(&spiffs, 0) => SPIFFS_ERR_NO_DELETED_BLOCKS;
    #elif defined(YAFFS2)
    yaffs_sync("/") => 0;
    #endif

    // reset our timer
    bench_helpers_simreset(CFG);

    // open a file
    BENCH_START("write", 0);
    #if defined(LFS3)
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_random",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #elif defined(LFS2)
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_random",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #elif defined(SPIFFS)
    spiffs_file fd = SPIFFS_open(&spiffs, "bench_random",
            SPIFFS_RDWR | SPIFFS_CREAT | SPIFFS_EXCL, 0777);
    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_random", O_RDWR | O_CREAT | O_EXCL, 0777);
    assert(fd >= 0);
    #endif
    lfs3_off_t size = 0;
    uint64_t written = 0;
    while (!(SIM_SIZE
                && written >= (uint64_t)SIM_SIZE)
            && !(SIM_TIME
                && bench_helpers_simtime(CFG) >= (uint64_t)SIM_TIME)) {
        // seek to a random location
        lfs3_off_t pos = BENCH_PRNG(&prng) % SIZE;
        #if defined(LFS3)
        lfs3_file_seek(&lfs3, &file, pos, LFS3_SEEK_SET) => pos;
        #elif defined(LFS2)
        lfs2_file_seek(&lfs2, &file, pos, LFS2_SEEK_SET) => pos;
        #elif defined(SPIFFS)
        // if we seek beyond the end of the file we need to emulate zeros
        if (pos > size) {
            SPIFFS_lseek(&spiffs, fd, 0, SPIFFS_SEEK_END) => size;
            for (lfs3_size_t i = 0; i < (pos - size); i++) {
                SPIFFS_write(&spiffs, fd, &(uint8_t){0}, 1) => 1;
            }
        }
        SPIFFS_lseek(&spiffs, fd, pos, SPIFFS_SEEK_SET) => pos;
        #elif defined(YAFFS2)
        yaffs_lseek(fd, pos, SEEK_SET) => pos;
        #endif

        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #if defined(LFS3)
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif
        written += CHUNK;

        size = lfs3_max(size, pos + CHUNK);

        // bail if we get stuck
        if (SIM_TIME && bench_helpers_simstuck(CFG, written)) {
            return;
        }
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    BENCH_STOP("write");

    // it's a bit awkward, but this reports the amount written to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("write", written);
    BENCH_STOP("write");

    // report the total stack/heap usage after the benchmark
    BENCH_RESULT("stack", written, BENCH_STACK());
    BENCH_RESULT("heap", written, BENCH_HEAP());

    // find the total disk usage after the benchmark
    #if defined(LFS3)
    uintmax_t usage = bench_helpers_usage(&lfs3);
    #elif defined(LFS2)
    uintmax_t usage = bench_helpers_usage(&lfs2);
    #elif defined(SPIFFS)
    uintmax_t usage = bench_helpers_usage(&spiffs);
    #elif defined(YAFFS2)
    uintmax_t usage = bench_helpers_usage(&yaffs2);
    #endif
    BENCH_RESULT("usage", written, usage);

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

[cases.bench_p26_wt_many]
if = [
    # littlefs2 simply doesn't scale well enough to create this many files
    'BENCH_IFDEF_LFS2(SIZE <= 128*1024, true)',
    # spiffs simply doesn't scale well enough to create this many files
    'BENCH_IFDEF_SPIFFS(SIZE <= 128*1024, true)',
    # and surprisingly this was an issue for yaffs2 as well! but not on
    # disk! the internal RAM-backed linked-list of on-disk files grows
    # O(n), we aren't benchmarking this but it becomes a problem for
    # actually running this bench
    'BENCH_IFDEF_YAFFS2(SIZE <= 128*1024, true)',
]
code = '''
    // ok, one of these needs to be non-zero
    LFS3_ASSERT(SIM_TIME > 0 || SIM_SIZE > 0);

    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t work_buffer[2*SPAGE_SIZE];
    uint8_t fd_buffer[FD_SIZE];
    uint8_t scache_buffer[SCACHE_SIZE];
    // yes we need this mount
    int err = SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL);
    assert(err == SPIFFS_ERR_NOT_A_FS
            || err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE);
    if (err == SPIFFS_ERR_MAGIC_NOT_POSSIBLE) {
        printf("error: spiffs magic not possible\n");
        return;
    }
    SPIFFS_format(&spiffs) => 0;
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #if defined(LFS3)
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_gc_quick(&spiffs, 0) => SPIFFS_ERR_NO_DELETED_BLOCKS;
    #elif defined(YAFFS2)
    yaffs_sync("/") => 0;
    #endif

    // reset our timer
    bench_helpers_simreset(CFG);

    // open a file
    BENCH_START("write", 0);
    uint64_t written = 0;
    #ifdef LFS2
    int err;
    #endif
    while (!(SIM_SIZE
                && written >= (uint64_t)SIM_SIZE)
            && !(SIM_TIME
                && bench_helpers_simtime(CFG) >= (uint64_t)SIM_TIME)) {
        // choose a random filename
        lfs3_off_t pos = BENCH_PRNG(&prng) % ((SIZE+(CHUNK-1))/CHUNK);
        char name[256];
        sprintf(name, "bench_%08x", pos);

        // create the file
        //
        // note file == CHUNK here, the sum of all files should add up
        // roughly to the benchmark SIZE
        uint8_t wbuf[CHUNK];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), CHUNK);
        #if defined(LFS3)
        lfs3_file_t file;
        lfs3_file_open(&lfs3, &file, name,
                LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_TRUNC) => 0;
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        lfs3_file_close(&lfs3, &file) => 0;
        #elif defined(LFS2)
        lfs2_file_t file;
        err = lfs2_file_open(&lfs2, &file, name,
                LFS2_O_WRONLY | LFS2_O_CREAT | LFS2_O_TRUNC);
        // TODO littlefs2 bug?
        assert(!err || err == LFS2_ERR_NOENT);
        if (err) {
            goto failed;
        }
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        err = lfs2_file_close(&lfs2, &file);
        // TODO littlefs2 bug?
        assert(!err || err == LFS2_ERR_NOENT);
        if (err) {
            goto failed;
        }
        #elif defined(SPIFFS)
        spiffs_file fd = SPIFFS_open(&spiffs, name,
                SPIFFS_RDWR | SPIFFS_CREAT | SPIFFS_TRUNC, 0777);
        assert(fd >= 0);
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        SPIFFS_close(&spiffs, fd) => 0;
        #elif defined(YAFFS2)
        int fd = yaffs_open(name, O_RDWR | O_CREAT | O_TRUNC, 0777);
        assert(fd >= 0);
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        yaffs_close(fd) => 0;
        #endif

        written += CHUNK;

        // bail if we get stuck
        if (SIM_TIME && bench_helpers_simstuck(CFG, written)) {
            return;
        }
    }
    BENCH_STOP("write");

    // it's a bit awkward, but this reports the amount written to
    // result scripts
    // TODO we should really move n to BENCH_STOP
    BENCH_START("write", written);
    BENCH_STOP("write");

    // report the total stack/heap usage after the benchmark
    BENCH_RESULT("stack", written, BENCH_STACK());
    BENCH_RESULT("heap", written, BENCH_HEAP());

    // find the total disk usage after the benchmark
    #if defined(LFS3)
    uintmax_t usage = bench_helpers_usage(&lfs3);
    #elif defined(LFS2)
    uintmax_t usage = bench_helpers_usage(&lfs2);
    #elif defined(SPIFFS)
    uintmax_t usage = bench_helpers_usage(&spiffs);
    #elif defined(YAFFS2)
    uintmax_t usage = bench_helpers_usage(&yaffs2);
    #endif
    BENCH_RESULT("usage", written, usage);

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
    return;

    #ifdef LFS2
failed:;
    // apparently littlefs2 is very fragile with many files,
    // just log this error and mark the test as bad for now
    printf("error: lfs2 close failure: %d\n", err);
    lfs2_unmount(&lfs2) => 0;
    return;
    #endif
'''

