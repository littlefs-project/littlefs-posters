# Bench our mid-level B-trees

# maximize lookahead buffer, we don't actually gc so we only get one pass
# of the disk for these tests
defines.LOOKAHEAD_SIZE = '(BLOCK_COUNT+8-1) / 8'

[cases.bench_btree_btree]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;
    // create free lookahead
    memset(lfs3.lookahead.buffer, 0, CFG->lookahead_size);
    lfs3.lookahead.window = 2;
    lfs3.lookahead.off = 0;
    lfs3.lookahead.size = lfs3_min(8*CFG->lookahead_size,
            CFG->block_count-2);
    lfs3_alloc_ckpoint(&lfs3);

    // create a tree with N elements
    lfs3_btree_t btree;
    lfs3_btree_init(&btree);
    uint32_t prng = SEED;
    for (lfs3_bid_t i = 0; i < N; i++) {
        lfs3_bid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? 0
                : BENCH_PRNG(&prng) % (btree.weight+1);
        // measure commits
        if ((i+1) % STEP == 0) {
            BENCH_START("commit", i+1);
        }
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_btree_commit(&lfs3, &btree, i_, LFS3_RATTRS(
                LFS3_RATTR_BUF(
                    LFS3_TAG_DATA, +1,
                    wbuf, SIZE))) => 0;
        if ((i+1) % STEP == 0) {
            BENCH_STOP("commit");
        }

        // measure lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("lookup", i+1);
            lfs3_bid_t i_ = BENCH_PRNG(&prng) % (i+1);
            lfs3_bid_t bid_;
            lfs3_rbyd_t rbyd_;
            lfs3_srid_t rid_;
            lfs3_tag_t tag_;
            lfs3_bid_t weight_;
            lfs3_data_t data_;
            lfs3_btree_lookupleaf(&lfs3, &btree, i_,
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_) => 0;
            assert(bid_ == i_);
            assert(tag_ == LFS3_TAG_DATA);
            assert(weight_ == 1);
            assert(lfs3_data_size(data_) == SIZE);
            BENCH_STOP("lookup");
        }

        // measure disk usage
        if ((i+1) % STEP == 0) {
            lfs3_off_t count = 0;

            lfs3_btraversal_t bt;
            lfs3_btraversal_init(&bt);
            while (true) {
                lfs3_bid_t bid_;
                lfs3_tag_t tag_;
                lfs3_data_t data_;
                int err = lfs3_btree_traverse(&lfs3, &btree, &bt,
                        &bid_, &tag_, &data_);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }

                if (tag_ == LFS3_TAG_BRANCH) {
                    count += 1;
                }
            }

            BENCH_RESULT("usage", i+1,
                    (uintmax_t)count * CFG->block_size);
        }
    }
'''

[cases.bench_btree_namedbtree]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;
    // create free lookahead
    memset(lfs3.lookahead.buffer, 0, CFG->lookahead_size);
    lfs3.lookahead.window = 2;
    lfs3.lookahead.off = 0;
    lfs3.lookahead.size = lfs3_min(8*CFG->lookahead_size,
            CFG->block_count-2);
    lfs3_alloc_ckpoint(&lfs3);

    // create a tree with N elements
    lfs3_btree_t btree;
    lfs3_btree_init(&btree);
    uint32_t prng = SEED;
    for (lfs3_bid_t i = 0; i < N; i++) {
        lfs3_bid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? N-1-i
                : BENCH_PRNG(&prng) % N;
        // measure name commits
        if ((i+1) % STEP == 0) {
            BENCH_START("commit", i+1);
        }
        char name[256];
        sprintf(name, "e%05d", i_);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        // we need to map names to bids before we can commit, so include
        // that in the commit cost
        lfs3_bid_t bid;
        lfs3_rbyd_t rbyd;
        lfs3_srid_t rid;
        lfs3_tag_t tag;
        lfs3_bid_t weight;
        lfs3_data_t data;
        lfs3_scmp_t cmp = lfs3_btree_namelookupleaf(&lfs3, &btree,
                0, name, strlen(name),
                &bid, &rbyd, &rid, &tag, &weight, &data);
        assert(cmp >= 0 || cmp == LFS3_ERR_NOENT);
        if (cmp == LFS3_ERR_NOENT) {
            lfs3_btree_commit(&lfs3, &btree, 0, LFS3_RATTRS(
                    LFS3_RATTR_NAME(
                        LFS3_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else if (cmp > LFS3_CMP_EQ) {
            lfs3_btree_commit(&lfs3, &btree, bid, LFS3_RATTRS(
                    LFS3_RATTR_NAME(
                        LFS3_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else if (cmp < LFS3_CMP_EQ) {
            lfs3_btree_commit(&lfs3, &btree, bid, LFS3_RATTRS(
                    // yes, we need this noop
                    LFS3_RATTR_NOOP(),
                    LFS3_RATTR_NAME(
                        LFS3_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else {
            lfs3_btree_commit(&lfs3, &btree, bid, LFS3_RATTRS(
                    LFS3_RATTR_BUF(
                        LFS3_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        }
        if ((i+1) % STEP == 0) {
            BENCH_STOP("commit");
        }

        // measure name lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("namelookup", i+1);
            lfs3_bid_t i_ = BENCH_PRNG(&prng) % N;
            sprintf(name, "e%05d", i_);
            lfs3_bid_t bid_;
            lfs3_rbyd_t rbyd_;
            lfs3_srid_t rid_;
            lfs3_tag_t tag_;
            lfs3_bid_t weight_;
            lfs3_data_t data_;
            lfs3_scmp_t cmp = lfs3_btree_namelookupleaf(&lfs3, &btree,
                    0, name, strlen(name),
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_);
            assert(cmp >= 0 || cmp == LFS3_ERR_NOENT);
            if (cmp != LFS3_ERR_NOENT) {
                assert(tag_ == LFS3_TAG_REG);
                assert(weight_ == 1);
                assert(lfs3_data_size(data_) == 1+strlen(name));
            }
            BENCH_STOP("namelookup");
        }

        // measure lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("lookup", i+1);
            lfs3_bid_t i_ = BENCH_PRNG(&prng) % (i+1);
            lfs3_bid_t bid_;
            lfs3_rbyd_t rbyd_;
            lfs3_srid_t rid_;
            lfs3_tag_t tag_;
            lfs3_bid_t weight_;
            lfs3_data_t data_;
            int err = lfs3_btree_lookupleaf(&lfs3, &btree, i_,
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_);
            assert(!err || err == LFS3_ERR_NOENT);
            if (err != LFS3_ERR_NOENT) {
                assert(bid_ == i_);
                assert(tag_ == LFS3_TAG_REG);
                assert(weight_ == 1);
                assert(lfs3_data_size(data_) == 1+strlen(name));
            }
            BENCH_STOP("lookup");
        }

        // measure disk usage
        if ((i+1) % STEP == 0) {
            lfs3_off_t count = 0;

            lfs3_btraversal_t bt;
            lfs3_btraversal_init(&bt);
            while (true) {
                lfs3_bid_t bid_;
                lfs3_tag_t tag_;
                lfs3_data_t data_;
                int err = lfs3_btree_traverse(&lfs3, &btree, &bt,
                        &bid_, &tag_, &data_);
                assert(!err || err == LFS3_ERR_NOENT);
                if (err == LFS3_ERR_NOENT) {
                    break;
                }

                if (tag_ == LFS3_TAG_BRANCH) {
                    count += 1;
                }
            }

            BENCH_RESULT("usage", i+1,
                    (uintmax_t)count * CFG->block_size);
        }
    }
'''
