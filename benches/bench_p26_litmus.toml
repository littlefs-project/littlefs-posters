# High-level litmus benchmarks


# these are common and can be overridden suite-wide
#
# note for bench_p26_litmus_many, CHUNK => file size, and SIZE = sum of
# all files
#
defines.SIZE = 32768
defines.CHUNK = 32
defines.STEP = 1
defines.SEED = 42

# cutoffs for runaway littlefs2 performance
defines.LFS2_RANDOM_CUTOFF = 32768
defines.LFS2_MANY_CUTOFF = 32768



# common code for measuring disk usage, this is different per filesystem
code = '''
#ifdef LFS3
// measure disk usage
//
// littlefs can be a dag, so build a bitmap to find the exact
// disk usage
static void bench_p26_find_usage(lfs3_t *lfs3, lfs3_size_t n) {
    uint8_t *usage_bmap = malloc((BLOCK_COUNT+8-1)/8);
    memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);

    lfs3_trv_t trv;
    lfs3_trv_open(lfs3, &trv, 0) => 0;
    while (true) {
        struct lfs3_tinfo tinfo;
        int err = lfs3_trv_read(lfs3, &trv, &tinfo);
        assert(!err || err == LFS3_ERR_NOENT);
        if (err == LFS3_ERR_NOENT) {
            break;
        }

        usage_bmap[tinfo.block/8] |= 1 << (tinfo.block % 8);
    }
    lfs3_trv_close(lfs3, &trv) => 0;

    lfs3_size_t usage = 0;
    for (lfs3_size_t j = 0; j < BLOCK_COUNT; j++) {
        if (usage_bmap[j / 8] & (1 << (j % 8))) {
            usage += 1;
        }
    }
    BENCH_RESULT("usage", n, (uintmax_t)usage * (uintmax_t)BLOCK_SIZE);

    free(usage_bmap);
}
#else
static int bench_p26_find_usage_cb(void *ctx, lfs3_block_t block) {
    uint8_t *usage_bmap = ctx;
    // TODO found a bug in littlefs2?
    if ((lfs3_sblock_t)block < 0) {
        return 0;
    }
    usage_bmap[block/8] |= 1 << (block % 8);
    return 0;
}

// measure disk usage
//
// littlefs can be a dag, so build a bitmap to find the exact
// disk usage
static void bench_p26_find_usage(lfs2_t *lfs2, lfs3_size_t n) {
    uint8_t *usage_bmap = malloc((BLOCK_COUNT+8-1)/8);
    memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);

    lfs2_fs_traverse(lfs2, bench_p26_find_usage_cb, usage_bmap) => 0;

    lfs3_size_t usage = 0;
    for (lfs3_size_t j = 0; j < BLOCK_COUNT; j++) {
        if (usage_bmap[j / 8] & (1 << (j % 8))) {
            usage += 1;
        }
    }
    BENCH_RESULT("usage", n, (uintmax_t)usage * (uintmax_t)BLOCK_SIZE);

    free(usage_bmap);
}
#endif
'''



[cases.bench_p26_litmus_linear]
# 0 => benchmark writes
# 1 => measure usage
defines.MODE = [0, 1]
code = '''
    #ifdef LFS3
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #else
    lfs2_t lfs2;
    lfs2_format(&lfs2, (const struct lfs2_config*)CFG) => 0;
    lfs2_mount(&lfs2, (const struct lfs2_config*)CFG) => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #ifdef LFS3
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #else
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #endif

    // open a file
    if (MODE == 0) {
        BENCH_START("write", 0*CHUNK+CHUNK);
    }
    #ifdef LFS3
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_linear",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #else
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_linear",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #endif
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #ifdef LFS3
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #else
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write");
            BENCH_START("write", (i+1)*CHUNK+CHUNK);
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #ifdef LFS3
            bench_p26_find_usage(&lfs3, i*CHUNK+CHUNK);
            #else
            bench_p26_find_usage(&lfs2, i*CHUNK+CHUNK);
            #endif
        }
    }
    #ifdef LFS3
    lfs3_file_close(&lfs3, &file) => 0;
    #else
    lfs2_file_close(&lfs2, &file) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write");
    }

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''

[cases.bench_p26_litmus_random]
# 0 => benchmark writes
# 1 => measure usage
defines.MODE = [0, 1]
code = '''
    #ifdef LFS3
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #else
    lfs2_t lfs2;
    lfs2_format(&lfs2, (const struct lfs2_config*)CFG) => 0;
    lfs2_mount(&lfs2, (const struct lfs2_config*)CFG) => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #ifdef LFS3
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #else
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #endif

    // open a file
    if (MODE == 0) {
        BENCH_START("write", 0*CHUNK+CHUNK);
    }
    #ifdef LFS3
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_random",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #else
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_random",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #endif
    for (lfs3_size_t i = 0;
            i < (SIZE+(CHUNK-1))/CHUNK
                // cutoff littlefs2, at some point we stop caring about
                // just how badly littlefs2 scales
                && (FS != 2 || i < (LFS2_RANDOM_CUTOFF+(CHUNK-1))/CHUNK);
            i++) {
        // seek to a random location, but limit it to the related linear
        // file size, this shows interesting trends without too much
        // benchmarking
        lfs3_off_t pos = BENCH_PRNG(&prng) % (i*CHUNK+CHUNK);
        #ifdef LFS3
        lfs3_file_seek(&lfs3, &file, pos, LFS3_SEEK_SET) => pos;
        #else
        lfs2_file_seek(&lfs2, &file, pos, LFS2_SEEK_SET) => pos;
        #endif

        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #ifdef LFS3
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #else
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write");
            BENCH_START("write", (i+1)*CHUNK+CHUNK);
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #ifdef LFS3
            bench_p26_find_usage(&lfs3, i*CHUNK+CHUNK);
            #else
            bench_p26_find_usage(&lfs2, i*CHUNK+CHUNK);
            #endif
        }
    }
    #ifdef LFS3
    lfs3_file_close(&lfs3, &file) => 0;
    #else
    lfs2_file_close(&lfs2, &file) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write");
    }

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''

[cases.bench_p26_litmus_many]
# 0 => benchmark writes
# 1 => measure usage
defines.MODE = [0, 1]
code = '''
    #ifdef LFS3
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #else
    lfs2_t lfs2;
    lfs2_format(&lfs2, (const struct lfs2_config*)CFG) => 0;
    lfs2_mount(&lfs2, (const struct lfs2_config*)CFG) => 0;
    #endif
    uint32_t prng = SEED;

    // TODO should we be including format in our measurements?
    //
    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #ifdef LFS3
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #else
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #endif

    // create a filesystem with many files
    for (lfs3_size_t i = 0;
            i < (SIZE+(CHUNK-1))/CHUNK
                // cutoff littlefs2, at some point we stop caring about
                // just how badly littlefs2 scales
                && (FS != 2 || i < (LFS2_MANY_CUTOFF+(CHUNK-1))/CHUNK);
            i++) {
        // choose a random filename
        lfs3_off_t pos = BENCH_PRNG(&prng) % SIZE;
        char name[256];
        sprintf(name, "bench_%08x", pos);

        // create the file
        //
        // note file == CHUNK here, the sum of all files should add up
        // roughly to the benchmark SIZE
        if (MODE == 0 && (i+1) % STEP == 0) {
            BENCH_START("write", i*CHUNK+CHUNK);
        }
        uint8_t wbuf[CHUNK];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), CHUNK);
        #ifdef LFS3
        lfs3_file_t file;
        lfs3_file_open(&lfs3, &file, name,
                LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_TRUNC) => 0;
        lfs3_file_write(&lfs3, &file, &wbuf, CHUNK) => CHUNK;
        lfs3_file_close(&lfs3, &file) => 0;
        #else
        lfs2_file_t file;
        lfs2_file_open(&lfs2, &file, name,
                LFS2_O_WRONLY | LFS2_O_CREAT | LFS2_O_TRUNC) => 0;
        lfs2_file_write(&lfs2, &file, &wbuf, CHUNK) => CHUNK;
        lfs2_file_close(&lfs2, &file) => 0;
        #endif
        if (MODE == 0 && (i+1) % STEP == 0) {
            BENCH_STOP("write");
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #ifdef LFS3
            bench_p26_find_usage(&lfs3, i*CHUNK+CHUNK);
            #else
            bench_p26_find_usage(&lfs2, i*CHUNK+CHUNK);
            #endif
        }
    }

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''

[cases.bench_p26_litmus_logging]
# 0 => benchmark writes
# 1 => measure usage
defines.MODE = [0, 1]
defines.LOG_SIZE = '(SIZE+4-1) / 4'
code = '''
    #ifdef LFS3
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    #else
    lfs2_t lfs2;
    lfs2_format(&lfs2, (const struct lfs2_config*)CFG) => 0;
    lfs2_mount(&lfs2, (const struct lfs2_config*)CFG) => 0;
    #endif
    uint32_t prng = SEED;

    // go ahead and make consistent to avoid lazy mount operations
    // messing with the benchmark
    #ifdef LFS3
    lfs3_fs_mkconsistent(&lfs3) => 0;
    #else
    lfs2_fs_mkconsistent(&lfs2) => 0;
    #endif

    // open a file
    if (MODE == 0) {
        BENCH_START("write", 0*CHUNK+CHUNK);
    }
    #ifdef LFS3
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_log",
            LFS3_O_RDWR | LFS3_O_CREAT | LFS3_O_EXCL | LFS3_O_APPEND) => 0;
    #else
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_log",
            LFS2_O_RDWR | LFS2_O_CREAT | LFS2_O_EXCL | LFS2_O_APPEND) => 0;
    #endif
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        // append to log
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #ifdef LFS3
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #else
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #endif

        // sync
        #ifdef LFS3
        lfs3_file_sync(&lfs3, &file) => 0;
        #else
        lfs2_file_sync(&lfs2, &file) => 0;
        #endif

        // for v3, fruncate, for v2, rotate if full
        //
        // note we use LOG_SIZE < SIZE here, for interesting results,
        // otherwise we'd never truncate the log!
        #ifdef LFS3
        lfs3_soff_t size = lfs3_file_size(&lfs3, &file);
        assert(size >= 0);
        if (size > LOG_SIZE) {
            lfs3_file_fruncate(&lfs3, &file, LOG_SIZE) => 0;
        }
        #else
        lfs3_soff_t size = lfs2_file_size(&lfs2, &file);
        assert(size >= 0);
        if (size >= LOG_SIZE) {
            lfs2_file_close(&lfs2, &file) => 0;
            lfs2_rename(&lfs2, "bench_log", "bench_log.1") => 0;
            lfs2_file_open(&lfs2, &file, "bench_log",
                    LFS2_O_RDWR
                        | LFS2_O_CREAT
                        | LFS2_O_EXCL
                        | LFS2_O_APPEND) => 0;
        }
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write");
            BENCH_START("write", (i+1)*CHUNK+CHUNK);
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #ifdef LFS3
            bench_p26_find_usage(&lfs3, i*CHUNK+CHUNK);
            #else
            bench_p26_find_usage(&lfs2, i*CHUNK+CHUNK);
            #endif
        }
    }
    #ifdef LFS3
    lfs3_file_close(&lfs3, &file) => 0;
    #else
    lfs2_file_close(&lfs2, &file) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write");
    }

    #ifdef LFS3
    lfs3_unmount(&lfs3) => 0;
    #else
    lfs2_unmount(&lfs2) => 0;
    #endif
'''

