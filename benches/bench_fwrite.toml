# Bench file writes

[cases.bench_fwrite]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
# 3 = random-unaligned-order
defines.ORDER = [0, 1, 2, 3]
defines.SIZE = 16384
defines.CHUNK = 32
defines.SEED = 42
# 0 = don't rewrite
# 1 = full rewrite after full write
# 2 = chunk rewrites after incremental writes
defines.REWRITE = [0, 1, 2]
defines.SYNC = true
code = '''
    lfs_t lfs;
    lfsr_format(&lfs, LFS_F_RDWR, CFG) => 0;
    lfsr_mount(&lfs, LFS_M_RDWR | LFS_M_MKCONSISTENT, CFG) => 0;
    uint32_t prng = SEED;

    // find the baseline usage after format
    uint8_t *usage_bmap = malloc((BLOCK_COUNT+8-1)/8);
    memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);
    lfsr_traversal_t t;
    lfsr_traversal_open(&lfs, &t, 0) => 0;
    while (true) {
        struct lfs_tinfo tinfo;
        int err = lfsr_traversal_read(&lfs, &t, &tinfo);
        assert(!err || err == LFS_ERR_NOENT);
        if (err == LFS_ERR_NOENT) {
            break;
        }

        usage_bmap[tinfo.block/8] |= 1 << (tinfo.block % 8);
    }
    lfsr_traversal_close(&lfs, &t) => 0;
    lfs_size_t usage_baseline = 0;
    for (lfs_size_t j = 0; j < BLOCK_COUNT; j++) {
        if (usage_bmap[j / 8] & (1 << (j % 8))) {
            usage_baseline += 1;
        }
    }

    // create an initial file to rewrite?
    if (REWRITE == 1) {
        lfsr_file_t file;
        lfsr_file_open(&lfs, &file, "bench_file",
                LFS_O_WRONLY | LFS_O_CREAT | LFS_O_TRUNC) => 0;
        for (lfs_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
            uint8_t wbuf[CHUNK];
            for (lfs_size_t j = 0; j < CHUNK; j++) {
                wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
            }
            lfsr_file_write(&lfs, &file, wbuf, CHUNK) => CHUNK;
        }
        lfsr_file_close(&lfs, &file) => 0;
    }

    // write our file
    lfsr_file_t file;
    lfsr_file_open(&lfs, &file, "bench_file",
            LFS_O_RDWR | LFS_O_CREAT) => 0;
    for (lfs_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        lfs_off_t i_
                = (REWRITE == 2 || ORDER == 0)
                    ? i*CHUNK
                : (ORDER == 1)
                    ? (((SIZE+(CHUNK-1))/CHUNK)-1-i)*CHUNK
                : (ORDER == 2)
                    ? (BENCH_PRNG(&prng) % (
                        (SIZE+(CHUNK-1))/CHUNK))
                            * CHUNK
                    : BENCH_PRNG(&prng) % (
                        lfs_max(SIZE, CHUNK)
                            - (CHUNK-1));

        if (REWRITE <= 1) {
            BENCH_START("write", i*CHUNK+CHUNK);
        }
        // seek to where we want to write
        lfsr_file_seek(&lfs, &file, i_, LFS_SEEK_SET) => i_;

        // actually write
        uint8_t wbuf[CHUNK];
        for (lfs_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        lfsr_file_write(&lfs, &file, wbuf, CHUNK) => CHUNK;

        // sync?
        if (SYNC) {
            lfsr_file_sync(&lfs, &file) => 0;
        }
        if (REWRITE <= 1) {
            BENCH_STOP("write");
        }

        if (REWRITE == 2) {
            // measure a random chunk-sized rewrite
            lfs_off_t i__
                    = (ORDER == 0)
                        ? i*CHUNK
                    : (ORDER == 1)
                        ? 0
                    : (ORDER == 2)
                        ? (BENCH_PRNG(&prng) % (
                            (lfsr_file_size(&lfs, &file)+(CHUNK-1))/CHUNK))
                                * CHUNK
                        : BENCH_PRNG(&prng) % (
                            lfs_max(lfsr_file_size(&lfs, &file), CHUNK)
                                - (CHUNK-1));
            BENCH_START("write", i*CHUNK+CHUNK);
            // seek to where we want to write
            lfsr_file_seek(&lfs, &file, i__, LFS_SEEK_SET) => i__;

            // actually write
            uint8_t wbuf[CHUNK];
            for (lfs_size_t j = 0; j < CHUNK; j++) {
                wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
            }
            lfsr_file_write(&lfs, &file, wbuf, CHUNK) => CHUNK;

            // sync?
            if (SYNC) {
                lfsr_file_sync(&lfs, &file) => 0;
            }
            BENCH_STOP("write");
        }

        // measure a random chunk-sized read
        lfs_off_t i__ = BENCH_PRNG(&prng) % (
                lfs_max(lfsr_file_size(&lfs, &file), CHUNK) - (CHUNK-1));
        BENCH_START("read", i*CHUNK+CHUNK);
        lfsr_file_seek(&lfs, &file, i__, LFS_SEEK_SET) => i__;

        uint8_t rbuf[CHUNK];
        lfsr_file_read(&lfs, &file, rbuf, CHUNK) => CHUNK;
        BENCH_STOP("read");

        // measure disk usage
        //
        // littlefs can be a dag, so build a bitmap to find the exact
        // disk usage
        memset(usage_bmap, 0, (BLOCK_COUNT+8-1)/8);
        lfsr_traversal_open(&lfs, &t, 0) => 0;
        while (true) {
            struct lfs_tinfo tinfo;
            int err = lfsr_traversal_read(&lfs, &t, &tinfo);
            assert(!err || err == LFS_ERR_NOENT);
            if (err == LFS_ERR_NOENT) {
                break;
            }

            usage_bmap[tinfo.block/8] |= 1 << (tinfo.block % 8);
        }
        lfsr_traversal_close(&lfs, &t) => 0;
        lfs_size_t usage = 0;
        for (lfs_size_t j = 0; j < BLOCK_COUNT; j++) {
            if (usage_bmap[j / 8] & (1 << (j % 8))) {
                usage += 1;
            }
        }
        BENCH_RESULT("usage", i*CHUNK+CHUNK,
                (uintmax_t)(usage - usage_baseline)
                    * (uintmax_t)CFG->block_size);
    }
    lfsr_file_close(&lfs, &file) => 0;

    free(usage_bmap);
    lfsr_unmount(&lfs) => 0;
'''

