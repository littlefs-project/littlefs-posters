    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_log",
            O_WRONLY | O_CREAT | O_EXCL | O_APPEND, 0777);
    assert(fd >= 0);
    #endif
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        // append to log
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
