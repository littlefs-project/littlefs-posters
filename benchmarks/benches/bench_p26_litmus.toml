        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif

        // sync
        #if defined(LFS3)
        lfs3_file_sync(&lfs3, &file) => 0;
        #elif defined(LFS2)
        lfs2_file_sync(&lfs2, &file) => 0;
        #elif defined(SPIFFS)
        s32_t d = SPIFFS_fflush(&spiffs, fd);
        assert(d >= 0);
        #elif defined(YAFFS2)
        yaffs_fsync(fd) => 0;
        #endif

        // for v3, fruncate, for v2 spiffs yaffs2, rotate if full
        //
        // note we use LOG_SIZE < SIZE here, for interesting results,
        // otherwise we'd never truncate the log!
        #if defined(LFS3)
        lfs3_soff_t size = lfs3_file_size(&lfs3, &file);
        assert(size >= 0);
        if (size > LOG_SIZE) {
            lfs3_file_fruncate(&lfs3, &file, LOG_SIZE) => 0;
        }
        #elif defined(LFS2)
        lfs3_soff_t size = lfs2_file_size(&lfs2, &file);
        assert(size >= 0);
        if (size >= LOG_SIZE) {
            lfs2_file_close(&lfs2, &file) => 0;
            lfs2_rename(&lfs2, "bench_log", "bench_log.1") => 0;
            lfs2_file_open(&lfs2, &file, "bench_log",
                    LFS2_O_WRONLY
                        | LFS2_O_CREAT
                        | LFS2_O_EXCL
                        | LFS2_O_APPEND) => 0;
        }
        #elif defined(SPIFFS)
        spiffs_stat stat;
        SPIFFS_fstat(&spiffs, fd, &stat) => 0;
        if (stat.size >= LOG_SIZE) {
            SPIFFS_close(&spiffs, fd) => 0;
            int err = SPIFFS_remove(&spiffs, "bench_log.1");
            assert(!err || err == SPIFFS_ERR_NOT_FOUND);
            SPIFFS_rename(&spiffs, "bench_log", "bench_log.1") => 0;
            fd = SPIFFS_open(&spiffs, "bench_log",
                    SPIFFS_WRONLY
                        | SPIFFS_CREAT
                        | SPIFFS_EXCL
                        | SPIFFS_APPEND, 0777);
            assert(fd >= 0);
        }
        #elif defined(YAFFS2)
        struct yaffs_stat stat;
        yaffs_fstat(fd, &stat) => 0;
        if (stat.st_size >= LOG_SIZE) {
            yaffs_close(fd) => 0;
            yaffs_rename("bench_log", "bench_log.1") => 0;
            fd = yaffs_open("bench_log",
                    O_WRONLY | O_CREAT | O_EXCL | O_APPEND, 0777);
            assert(fd >= 0);
        }
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write", i*CHUNK+CHUNK);
            BENCH_START("write");
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #if defined(LFS3)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs3);
            #elif defined(LFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs2);
            #elif defined(SPIFFS)
            uintmax_t usage = bench_helpers_usage(CFG, &spiffs);
            #elif defined(YAFFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &yaffs2);
            #endif
            BENCH_RESULT("usage", i*CHUNK+CHUNK, usage);
        }

        if (MODE == 2 && (i+1) % STEP == 0) {
            // measure stack/heap usage
            BENCH_RESULT("stack", i*CHUNK+CHUNK, BENCH_STACK_WATERMARK());
            BENCH_RESULT("ctx", i*CHUNK+CHUNK, BENCH_STACK_CURRENT());
            BENCH_RESULT("heap", i*CHUNK+CHUNK, BENCH_HEAP_WATERMARK());
        }
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write", (SIZE+(CHUNK-1))/CHUNK);
    }

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    free(work_buffer);
    free(fd_buffer);
    free(scache_buffer);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

