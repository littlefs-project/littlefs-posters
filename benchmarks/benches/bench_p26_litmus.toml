# High-level litmus benchmarks


# these are common and can be overridden suite-wide
#
# note for bench_*_many, file size defaults to CHUNK, and SIZE = sum of
# all files
#
defines.SIZE = 32768
defines.CHUNK = 64
defines.STEP = 1
defines.SEED = 42

# note FILE_SIZE is bench_*_many specific
defines.FILE_SIZE = 'CHUNK'
defines.FILE_COUNT = '(SIZE+(FILE_SIZE-1)) / lfs3_max(FILE_SIZE, 1)'

# include common bench helpers
code = '''
#include "benches/bench_helpers.h"
'''


[cases.bench_p26_litmus_linear]
# 0 => benchmark writes
# 1 => measure disk usage
# 2 => measure stack/heap usage
defines.MODE = [0, 1, 2]
code = '''
    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    int err = bench_helpers_warmup(CFG, &lfs3);
    if (err) {
        return;
    }
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    int err = bench_helpers_warmup(CFG, &lfs2);
    if (err) {
        return;
    }
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t *work_buffer = malloc(2*SPAGE_SIZE);
    uint8_t *fd_buffer = malloc(FD_SIZE);
    uint8_t *scache_buffer = malloc(SCACHE_SIZE);
    // spiffs format without magic just needs a disk erase
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    int err = bench_helpers_warmup(CFG, &spiffs);
    if (err) {
        return;
    }
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    int err = bench_helpers_warmup(CFG, &yaffs2);
    if (err) {
        return;
    }
    #endif
    uint32_t prng = SEED;

    // open a file
    if (MODE == 0) {
        BENCH_START("write");
    }
    #if defined(LFS3)
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_linear",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #elif defined(LFS2)
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_linear",
            LFS2_O_WRONLY | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #elif defined(SPIFFS)
    spiffs_file fd = SPIFFS_open(&spiffs, "bench_linear",
            SPIFFS_WRONLY | SPIFFS_CREAT | SPIFFS_EXCL, 0777);
    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_linear", O_WRONLY | O_CREAT | O_EXCL, 0777);
    assert(fd >= 0);
    #endif
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #if defined(LFS3)
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write", i*CHUNK+CHUNK);
            BENCH_START("write");
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #if defined(LFS3)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs3);
            #elif defined(LFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs2);
            #elif defined(SPIFFS)
            uintmax_t usage = bench_helpers_usage(CFG, &spiffs);
            #elif defined(YAFFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &yaffs2);
            #endif
            BENCH_RESULT("usage", i*CHUNK+CHUNK, usage);
        }

        if (MODE == 2 && (i+1) % STEP == 0) {
            // measure stack/heap usage
            BENCH_RESULT("stack", i*CHUNK+CHUNK, BENCH_STACK_WATERMARK());
            BENCH_RESULT("ctx", i*CHUNK+CHUNK, BENCH_STACK_CURRENT());
            BENCH_RESULT("heap", i*CHUNK+CHUNK, BENCH_HEAP_WATERMARK());
        }
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write", (SIZE+(CHUNK-1))/CHUNK);
    }

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    free(work_buffer);
    free(fd_buffer);
    free(scache_buffer);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

[cases.bench_p26_litmus_random]
# 0 => benchmark writes
# 1 => measure disk usage
# 2 => measure stack/heap usage
defines.MODE = [0, 1, 2]
# don't bother with litmus benchmarks for things that don't scale
if = [
    'BENCH_IFDEF_SPIFFS(SIZE <= 128*1024, true)',
    'BENCH_IFDEF_LFS2(SIZE <= 128*1024, true)',
]
code = '''
    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    int err = bench_helpers_warmup(CFG, &lfs3);
    if (err) {
        return;
    }
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    int err = bench_helpers_warmup(CFG, &lfs2);
    if (err) {
        return;
    }
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t *work_buffer = malloc(2*SPAGE_SIZE);
    uint8_t *fd_buffer = malloc(FD_SIZE);
    uint8_t *scache_buffer = malloc(SCACHE_SIZE);
    // spiffs format without magic just needs a disk erase
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    int err = bench_helpers_warmup(CFG, &spiffs);
    if (err) {
        return;
    }
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    int err = bench_helpers_warmup(CFG, &yaffs2);
    if (err) {
        return;
    }
    #endif
    uint32_t prng = SEED;

    // open a file
    if (MODE == 0) {
        BENCH_START("write");
    }
    #if defined(LFS3)
    lfs3_file_t file;
    lfs3_file_open(&lfs3, &file, "bench_random",
            LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_EXCL) => 0;
    #elif defined(LFS2)
    lfs2_file_t file;
    lfs2_file_open(&lfs2, &file, "bench_random",
            LFS2_O_WRONLY | LFS2_O_CREAT | LFS2_O_EXCL) => 0;
    #elif defined(SPIFFS)
    spiffs_file fd = SPIFFS_open(&spiffs, "bench_random",
            SPIFFS_WRONLY | SPIFFS_CREAT | SPIFFS_EXCL, 0777);
    assert(fd >= 0);
    #elif defined(YAFFS2)
    int fd = yaffs_open("bench_random", O_WRONLY | O_CREAT | O_EXCL, 0777);
    assert(fd >= 0);
    #endif
    lfs3_off_t size = 0;
    for (lfs3_size_t i = 0; i < (SIZE+(CHUNK-1))/CHUNK; i++) {
        // seek to a random location, but limit it to the related linear
        // file size, this shows interesting trends without too much
        // benchmarking
        lfs3_off_t pos = BENCH_PRNG(&prng) % (i*CHUNK+CHUNK);
        #if defined(LFS3)
        lfs3_file_seek(&lfs3, &file, pos, LFS3_SEEK_SET) => pos;
        #elif defined(LFS2)
        lfs2_file_seek(&lfs2, &file, pos, LFS2_SEEK_SET) => pos;
        #elif defined(SPIFFS)
        // if we seek beyond the end of the file we need to emulate zeros
        if (pos > size) {
            SPIFFS_lseek(&spiffs, fd, 0, SPIFFS_SEEK_END) => size;
            for (lfs3_size_t i = 0; i < (pos - size); i++) {
                SPIFFS_write(&spiffs, fd, &(uint8_t){0}, 1) => 1;
            }
        }
        SPIFFS_lseek(&spiffs, fd, pos, SPIFFS_SEEK_SET) => pos;
        #elif defined(YAFFS2)
        yaffs_lseek(fd, pos, SEEK_SET) => pos;
        #endif

        // write to the file
        uint8_t wbuf[CHUNK];
        for (lfs3_size_t j = 0; j < CHUNK; j++) {
            wbuf[j] = 'a' + (BENCH_PRNG(&prng) % 26);
        }
        #if defined(LFS3)
        lfs3_file_write(&lfs3, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(LFS2)
        lfs2_file_write(&lfs2, &file, wbuf, CHUNK) => CHUNK;
        #elif defined(SPIFFS)
        SPIFFS_write(&spiffs, fd, wbuf, CHUNK) => CHUNK;
        #elif defined(YAFFS2)
        yaffs_write(fd, wbuf, CHUNK) => CHUNK;
        #endif

        // a little bit weird, but this incrementally measures linear
        // writes, including open and close costs
        if (MODE == 0
                && (i+1) % STEP == 0
                && (i+1) < (SIZE+(CHUNK-1))/CHUNK) {
            BENCH_STOP("write", (i+1)*CHUNK+CHUNK);
            BENCH_START("write");
        }

        if (MODE == 1 && (i+1) % STEP == 0) {
            // measure disk usage
            #if defined(LFS3)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs3);
            #elif defined(LFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &lfs2);
            #elif defined(SPIFFS)
            uintmax_t usage = bench_helpers_usage(CFG, &spiffs);
            #elif defined(YAFFS2)
            uintmax_t usage = bench_helpers_usage(CFG, &yaffs2);
            #endif
            BENCH_RESULT("usage", i*CHUNK+CHUNK, usage);
        }

        if (MODE == 2 && (i+1) % STEP == 0) {
            // measure stack/heap usage
            BENCH_RESULT("stack", i*CHUNK+CHUNK, BENCH_STACK_WATERMARK());
            BENCH_RESULT("ctx", i*CHUNK+CHUNK, BENCH_STACK_CURRENT());
            BENCH_RESULT("heap", i*CHUNK+CHUNK, BENCH_HEAP_WATERMARK());
        }

        size = lfs3_max(size, pos + CHUNK);
    }
    #if defined(LFS3)
    lfs3_file_close(&lfs3, &file) => 0;
    #elif defined(LFS2)
    lfs2_file_close(&lfs2, &file) => 0;
    #elif defined(SPIFFS)
    SPIFFS_close(&spiffs, fd) => 0;
    #elif defined(YAFFS2)
    yaffs_close(fd) => 0;
    #endif
    if (MODE == 0) {
        BENCH_STOP("write", (SIZE+(CHUNK-1))/CHUNK);
    }

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    free(work_buffer);
    free(fd_buffer);
    free(scache_buffer);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

[cases.bench_p26_litmus_many]
# 0 => benchmark writes
# 1 => measure disk usage
# 2 => measure stack/heap usage
defines.MODE = [0, 1, 2]
# don't bother with litmus benchmarks for things that don't scale
if = [
    'BENCH_IFDEF_SPIFFS(SIZE <= 128*1024, true)',
    'BENCH_IFDEF_LFS2(SIZE <= 128*1024, true)',
]
code = '''
    #if defined(LFS3)
    lfs3_t lfs3;
    lfs3_format(&lfs3, LFS3_F_RDWR, CFG) => 0;
    lfs3_mount(&lfs3, LFS3_M_RDWR, CFG) => 0;
    int err = bench_helpers_warmup(CFG, &lfs3);
    if (err) {
        return;
    }
    #elif defined(LFS2)
    lfs2_t lfs2;
    lfs2_format(&lfs2, CFG_LFS2) => 0;
    lfs2_mount(&lfs2, CFG_LFS2) => 0;
    int err = bench_helpers_warmup(CFG, &lfs2);
    if (err) {
        return;
    }
    #elif defined(SPIFFS)
    spiffs spiffs;
    spiffs.user_data = CFG;
    uint8_t *work_buffer = malloc(2*SPAGE_SIZE);
    uint8_t *fd_buffer = malloc(FD_SIZE);
    uint8_t *scache_buffer = malloc(SCACHE_SIZE);
    // spiffs format without magic just needs a disk erase
    SPIFFS_mount(&spiffs, (spiffs_config*)CFG_SPIFFS, work_buffer,
            fd_buffer, FD_SIZE,
            scache_buffer, SCACHE_SIZE,
            NULL) => 0;
    int err = bench_helpers_warmup(CFG, &spiffs);
    if (err) {
        return;
    }
    #elif defined(YAFFS2)
    // note this implicitly zeros yaffs_dev
    struct yaffs_dev yaffs2 = {
        .driver_context = CFG,
        .param = CFG_YAFFS2->param,
        .drv = CFG_YAFFS2->drv,
    };
    yaffs_add_device(&yaffs2);
    yaffs_format("/", false, false, false) => 0;
    yaffs_mount("/") => 0;
    int err = bench_helpers_warmup(CFG, &yaffs2);
    if (err) {
        return;
    }
    #endif
    uint32_t prng = SEED;

    // create a filesystem with many files
    if (MODE == 0) {
        BENCH_START("write");
    }
    for (lfs3_size_t i = 0; i < FILE_COUNT; i++) {
        // choose a random filename
        lfs3_off_t pos = BENCH_PRNG(&prng) % (i+1);
        char name[256];
        sprintf(name, "bench_%08x", pos);
        uint8_t wbuf[CHUNK];

        // create the file
        //
        // note file == CHUNK here, the sum of all files should add up
        // roughly to the benchmark SIZE
        #if defined(LFS3)
        lfs3_file_t file;
        lfs3_file_open(&lfs3, &file, name,
                LFS3_O_WRONLY | LFS3_O_CREAT | LFS3_O_TRUNC) => 0;
        #elif defined(LFS2)
        lfs2_file_t file;
        lfs2_file_open(&lfs2, &file, name,
                LFS2_O_WRONLY | LFS2_O_CREAT | LFS2_O_TRUNC) => 0;
        #elif defined(SPIFFS)
        spiffs_file fd = SPIFFS_open(&spiffs, name,
                SPIFFS_WRONLY | SPIFFS_CREAT | SPIFFS_TRUNC, 0777);
        assert(fd >= 0);
        #elif defined(YAFFS2)
        int fd = yaffs_open(name, O_WRONLY | O_CREAT | O_TRUNC, 0777);
        assert(fd >= 0);
        #endif
        for (lfs3_size_t j = 0; j < (FILE_SIZE+(CHUNK-1))/CHUNK; j++) {
            lfs3_ssize_t d = lfs3_min(CHUNK, FILE_SIZE);
            memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), d);
            #if defined(LFS3)
            lfs3_file_write(&lfs3, &file, wbuf, d) => d;
            #elif defined(LFS2)
            lfs2_file_write(&lfs2, &file, wbuf, d) => d;
            #elif defined(SPIFFS)
            SPIFFS_write(&spiffs, fd, wbuf, d) => d;
            #elif defined(YAFFS2)
            yaffs_write(fd, wbuf, d) => d;
            #endif

            // a little bit weird, but this incrementally measures linear
            // writes, including open and close costs
            if (MODE == 0
                    && (i+j+1) % STEP == 0
                    && (i+j+1) < (SIZE+(CHUNK-1))/CHUNK) {
                BENCH_STOP("write", (i+j)*CHUNK+CHUNK);
                BENCH_START("write");
            }

            if (MODE == 1 && (i+j+1) % STEP == 0) {
                // measure disk usage
                #if defined(LFS3)
                uintmax_t usage = bench_helpers_usage(CFG, &lfs3);
                #elif defined(LFS2)
                uintmax_t usage = bench_helpers_usage(CFG, &lfs2);
                #elif defined(SPIFFS)
                uintmax_t usage = bench_helpers_usage(CFG, &spiffs);
                #elif defined(YAFFS2)
                uintmax_t usage = bench_helpers_usage(CFG, &yaffs2);
                #endif
                BENCH_RESULT("usage", (i+j)*CHUNK+CHUNK, usage);
            }

            if (MODE == 2 && (i+j+1) % STEP == 0) {
                // measure stack/heap usage
                BENCH_RESULT("stack", (i+j)*CHUNK+CHUNK,
                        BENCH_STACK_WATERMARK());
                BENCH_RESULT("ctx", (i+j)*CHUNK+CHUNK,
                        BENCH_STACK_CURRENT());
                BENCH_RESULT("heap", (i+j)*CHUNK+CHUNK,
                        BENCH_HEAP_WATERMARK());
            }
        }
        #if defined(LFS3)
        lfs3_file_close(&lfs3, &file) => 0;
        #elif defined(LFS2)
        lfs2_file_close(&lfs2, &file) => 0;
        #elif defined(SPIFFS)
        SPIFFS_close(&spiffs, fd) => 0;
        #elif defined(YAFFS2)
        yaffs_close(fd) => 0;
        #endif
    }
    if (MODE == 0) {
        BENCH_STOP("write", FILE_COUNT*((FILE_SIZE+(CHUNK-1))/CHUNK));
    }

    #if defined(LFS3)
    lfs3_unmount(&lfs3) => 0;
    #elif defined(LFS2)
    lfs2_unmount(&lfs2) => 0;
    #elif defined(SPIFFS)
    SPIFFS_unmount(&spiffs);
    free(work_buffer);
    free(fd_buffer);
    free(scache_buffer);
    #elif defined(YAFFS2)
    yaffs_unmount("/") => 0;
    yaffs_remove_device(&yaffs2);
    #endif
'''

