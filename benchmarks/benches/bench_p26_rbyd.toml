# Low-level rbyd benchmarks

# limit to littlefs3 without a gbmap
ifdef = 'LFS3'
ifndef = 'LFS3_GBMAP'

# set block_size to the full size of disk so we can test arbitrarily
# large rbyd trees, we don't really care about block sizes at this
# abstraction level
#
defines.BLOCK_SIZE = 'DISK_SIZE'
defines.BLOCK_COUNT = 1

[cases.bench_p26_rbyd_create]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 4096
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    lfs3_rbyd_t rbyd = {
        .blocks[0] = 0,
        .eoff = 0,
        .cksum = 0,
        .trunk = 0,
        .weight = 0,
    };
    lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

    // create attrs, note we need to take care to generate
    // indexes within a valid range as the rbyd grows
    uint32_t prng = SEED;
    for (lfs3_size_t i = 0; i < N; i++) {
        // create an attr
        if ((i+1) % STEP == 0) {
            BENCH_START("create");
        }
        lfs3_off_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? 0
                : BENCH_PRNG(&prng) % (rbyd.weight+1);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                LFS3_RATTR(3, LFS3_TAG_DATA, +1, LFS3_FROM_DATA),
                LFS3_RATTR_ARG(SIZE),
                LFS3_RATTR_ARG(wbuf),
                LFS3_RATTR_NULL)) => 0;
        if ((i+1) % STEP == 0) {
            BENCH_STOP("create", i+1);
        }
    }
'''

[cases.bench_p26_rbyd_delete]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 4096
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    for (lfs3_size_t n = 0; n < N; n += STEP) {
        lfs3_rbyd_t rbyd = {
            .blocks[0] = 0,
            .eoff = 0,
            .cksum = 0,
            .trunk = 0,
            .weight = 0,
        };
        lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

        // create attrs, note we need to take care to generate
        // indexes within a valid range as the rbyd grows
        uint32_t prng = SEED;
        for (lfs3_size_t i = 0; i < n; i++) {
            // create an attr
            lfs3_off_t i_
                    = (ORDER == 0) ? i
                    : (ORDER == 1) ? 0
                    : BENCH_PRNG(&prng) % (rbyd.weight+1);
            uint8_t wbuf[SIZE];
            memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
            lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                    LFS3_RATTR(3, LFS3_TAG_DATA, +1, LFS3_FROM_DATA),
                    LFS3_RATTR_ARG(SIZE),
                    LFS3_RATTR_ARG(wbuf),
                    LFS3_RATTR_NULL)) => 0;
        }

        // delete an attr
        BENCH_START("delete");
        if (n > 0) {
            lfs3_off_t i_ = BENCH_PRNG(&prng) % n;
            lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                    LFS3_RATTR(1, LFS3_tag_RM, -1),
                    LFS3_RATTR_NULL)) => 0;
        }
        BENCH_STOP("delete", n+STEP);

        // test that our delete worked
        assert(rbyd.weight == lfs3_smax(n-1, 0));
    }
'''

[cases.bench_p26_rbyd_fetch]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 4096
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    lfs3_rbyd_t rbyd = {
        .blocks[0] = 0,
        .eoff = 0,
        .cksum = 0,
        .trunk = 0,
        .weight = 0,
    };
    lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

    // create attrs, note we need to take care to generate
    // indexes within a valid range as the rbyd grows
    uint32_t prng = SEED;
    for (lfs3_size_t i = 0; i < N; i++) {
        // create an attr
        lfs3_off_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? 0
                : BENCH_PRNG(&prng) % (rbyd.weight+1);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                LFS3_RATTR(3, LFS3_TAG_DATA, +1, LFS3_FROM_DATA),
                LFS3_RATTR_ARG(SIZE),
                LFS3_RATTR_ARG(wbuf),
                LFS3_RATTR_NULL)) => 0;

        if ((i+1) % STEP == 0) {
            // fetch the rbyd
            BENCH_START("fetch");
            lfs3_rbyd_t rbyd_;
            lfs3_rbyd_fetch(&lfs3, &rbyd_, rbyd.blocks[0], 0) => 0;
            assert(rbyd_.weight == i+1);
            BENCH_STOP("fetch", i+1);
        }
    }
'''

[cases.bench_p26_rbyd_lookup]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 4096
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs3.c'
code = '''
    lfs3_t lfs3;
    lfs3_init(&lfs3, LFS3_M_RDWR, CFG) => 0;

    lfs3_rbyd_t rbyd = {
        .blocks[0] = 0,
        .eoff = 0,
        .cksum = 0,
        .trunk = 0,
        .weight = 0,
    };
    lfs3_bd_erase(&lfs3, rbyd.blocks[0]) => 0;

    // create attrs, note we need to take care to generate
    // indexes within a valid range as the rbyd grows
    uint32_t prng = SEED;
    for (lfs3_size_t i = 0; i < N; i++) {
        // create an attr
        lfs3_off_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? 0
                : BENCH_PRNG(&prng) % (rbyd.weight+1);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfs3_rbyd_commit(&lfs3, &rbyd, i_, LFS3_RATTRS(
                LFS3_RATTR(3, LFS3_TAG_DATA, +1, LFS3_FROM_DATA),
                LFS3_RATTR_ARG(SIZE),
                LFS3_RATTR_ARG(wbuf),
                LFS3_RATTR_NULL)) => 0;

        if ((i+1) % STEP == 0) {
            // lookup an attr
            BENCH_START("lookup");
            i_ = BENCH_PRNG(&prng) % (i+1);
            lfs3_data_t data_;
            lfs3_stag_t tag_ = lfs3_rbyd_lookup(&lfs3, &rbyd,
                    i_, LFS3_TAG_DATA,
                    &data_);
            assert(tag_ == LFS3_TAG_DATA);
            assert(lfs3_data_size(&data_) == SIZE);
            BENCH_STOP("lookup", i+1);
        }
    }
'''

